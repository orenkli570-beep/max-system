<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX STOCK | OREN PROTOCOL MULTI-LANG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <style>
        :root { --gold: #c9a84c; --bg: #0f172a; --card: rgba(30, 41, 59, 0.95); }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: #fff; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 650px; padding-bottom: 50px; }
        .glass-card { background: var(--card); border: 1px solid rgba(201,168,76,0.3); border-radius: 28px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .header h1 { color: var(--gold); text-align: center; font-size: 2.2rem; margin: 10px 0; letter-spacing: 2px; }
        .lang-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-lang { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 14px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-lang.active { background: var(--gold); color: #000; }
        .input-group { margin-bottom: 15px; text-align: inherit; }
        label { display: block; margin-bottom: 5px; color: var(--gold); font-weight: 600; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: #000; color: #fff; font-size: 1rem; text-align: inherit; }
        .dob-grid { display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 8px; }
        .question-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 18px; margin-bottom: 15px; border-inline-start: 4px solid var(--gold); text-align: inherit; }
        .btn-main { width: 100%; padding: 18px; background: var(--gold); color: #000; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; font-size: 1.2rem; }
        .admin-footer { margin-top: 40px; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .btn-admin-access { background: transparent; border: 1px dashed var(--gold); color: var(--gold); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; opacity: 0.6; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const TXT = {
            HE: { dir: 'rtl', start: 'התחל שאלון גיוס', name: 'שם המועמד מלא', dob: 'תאריך לידה מלא', d: 'יום', m: 'חודש', y: 'שנה', sel: 'בחר תשובה...', sub: 'שלח שאלון', succ: 'נשלח בהצלחה!', back: 'חזרה לדף הבית', admin: 'כניסת מנהל 🔒' },
            EN: { dir: 'ltr', start: 'Start Application', name: 'Full Name', dob: 'Date of Birth', d: 'Day', m: 'Month', y: 'Year', sel: 'Select...', sub: 'Submit', succ: 'Submitted!', back: 'Home', admin: 'Admin Login 🔒' },
            RU: { dir: 'ltr', start: 'Начать анкету', name: 'ФИО', dob: 'Дата рождения', d: 'День', m: 'Месяц', y: 'Год', sel: 'Выбрать...', sub: 'Отправить', succ: 'Отправлено!', back: 'Домой', admin: 'Вход 🔒' },
            AR: { dir: 'rtl', start: 'ابدأ الاستبيان', name: 'الاسم الكامل', dob: 'تاريخ الميلاد', d: 'يوم', m: 'شهر', y: 'سنة', sel: 'اختر...', sub: 'إرسال', succ: 'تم الإرسال!', back: 'الرئيسية', admin: 'دخول المدير 🔒' },
            TH: { dir: 'ltr', start: 'เริ่มใบสมัคร', name: 'ชื่อ-นามสกุล', dob: 'วันเกิด', d: 'วัน', m: 'เดือน', y: 'ปี', sel: 'เลือก...', sub: 'ส่งข้อมูล', succ: 'สำเร็จ!', back: 'หน้าหลัก', admin: 'ผู้ดูแลระบบ 🔒' }
        };

        const Q_DATA = [
            {
                id: 1,
                HE: { q: "לקוח מחפש מוצר שחסר על המדף. מה תעשה?", a: ["אבדוק במחסן ואביא לו אישית", "אבדוק במחשב אם קיים במלאי", "אגיד שחסר ואכוון למוצר דומה", "אמשיך בעבודתי"] },
                EN: { q: "Customer looking for out-of-stock item. What do you do?", a: ["Check warehouse and bring it personally", "Check computer for stock", "Say it's missing and suggest similar", "Continue working"] },
                RU: { q: "Клиент ищет товар, которого нет на полке. Что вы сделаете?", a: ["Проверю на складе и принесу лично", "Проверю наличие по компьютеру", "Скажу, что товара нет, и предложу похожий", "Продолжу свою работу"] },
                AR: { q: "يبحث العميل عن منتج مفقود على الرف. ماذا ستفعل؟", a: ["سأتحقق من المخزن وأحضره شخصياً", "سأتحقق من الكمبيوتر إذا كان متوفراً", "سأقول إنه مفقود وأقترح منتجاً مشابهاً", "سأستمر في عملي المعتاد"] },
                TH: { q: "ลูกค้ามองหาสินค้าที่ไม่มีบนชั้น คุณจะทำอย่างไร?", a: ["ตรวจสอบในโกดังและนำมาให้ด้วยตัวเอง", "ตรวจสอบในคอมพิวเตอร์ว่ามีของไหม", "บอกว่าไม่มีและแนะนำสินค้าที่ใกล้เคียง", "ทำงานตามปกติ"] }
            },
            {
                id: 2,
                HE: { q: "יש תור ארוך מאוד בקופות ואתה בסידור מדף?", a: ["אגש מיד לעזור בקופה", "אחכה שיקראו לי", "אמשיך לסדר עד שאסיים", "אלך למחסן"] },
                EN: { q: "Long line at checkout while you are stocking shelves?", a: ["Immediately go help at checkout", "Wait to be called", "Continue stocking until finished", "Go to warehouse"] },
                RU: { q: "Длинная очередь на кассе, пока вы расставляете товар?", a: ["Сразу пойду помогать на кассу", "Подожду, пока меня позовут", "Продолжу расставлять, пока не закончу", "Уйду на склад"] },
                AR: { q: "هناك طابور طويل عند الصندوق وأنت تقوم بترتيب الرفوف؟", a: ["سأذهب فوراً للمساعدة في الصندوق", "سأنتظر حتى يتم استدعائي", "سأستمر في الترتيب حتى أنتهي", "سأذهب إلى المخزن"] },
                TH: { q: "มีคิวยาวที่แคชเชียร์ในขณะที่คุณกำลังจัดของ?", a: ["ไปช่วยที่แคชเชียร์ทันที", "รอให้เรียก", "จัดของต่อจนเสร็จ", "ไปที่โกดัง"] }
            }
            // הערה: בקוד המלא כאן יופיעו כל 15 השאלות המתורגמות באופן דומה.
        ];

        // נשלים כאן את הלוגיקה ל-15 שאלות כדי שהקוד ירוץ
        const FULL_QUESTIONS = Array.from({length: 15}, (_, i) => {
            if (Q_DATA[i]) return Q_DATA[i];
            return {
                id: i + 1,
                HE: { q: `שאלה ${i+1} מהפרוטוקול...`, a: ["תשובה 1 (מובילה)", "תשובה 2", "תשובה 3", "תשובה 4"] },
                EN: { q: `Question ${i+1} from protocol...`, a: ["Answer 1", "Answer 2", "Answer 3", "Answer 4"] },
                RU: { q: `Вопрос ${i+1}...`, a: ["Ответ 1", "Ответ 2", "Ответ 3", "Ответ 4"] },
                AR: { q: `سؤال ${i+1}...`, a: ["إجابة 1", "إجابة 2", "إجابة 3", "إجابة 4"] },
                TH: { q: `คำถามที่ ${i+1}...`, a: ["คำตอบ 1", "คำตอบ 2", "คำตอบ 3", "คำตอบ 4"] }
            };
        });

        const App = () => {
            const [v, setV] = useState('home');
            const [l, setL] = useState('HE');
            const [ans, setAns] = useState(Array(15).fill(null));
            const [f, setF] = useState({ n: '', d: '', m: '', y: '' });
            const [db, setDb] = useState([]);

            useEffect(() => {
                const s = localStorage.getItem('MAX_V6_LANG');
                if (s) setDb(JSON.parse(s));
            }, []);

            const send = () => {
                if (!f.n || !f.y || ans.includes(null)) return alert("Fill all fields / מלא את כל השדות");
                const score = ans.filter(a => a === 0).length;
                const prof = score >= 10 ? "יוזמה גבוהה" : score >= 6 ? "ביצועיסט" : "משימתי";
                const up = [...db, { ...f, prof, ts: new Date().toLocaleString() }];
                setDb(up); localStorage.setItem('MAX_V6_LANG', JSON.stringify(up));
                setV('done');
            };

            const t = TXT[l];

            if (v === 'admin') return (
                <div className="container" dir="rtl"><div className="glass-card">
                    <h2 style={{color:'var(--gold)'}}>לוח מנהל ({db.length})</h2>
                    <button onClick={()=>setV('home')} className="btn-lang" style={{marginBottom:20}}>חזרה</button>
                    {db.map((r, i) => (
                        <div key={i} style={{background:'rgba(0,0,0,0.3)', padding:15, borderRadius:12, marginBottom:10, borderRight:'4px solid var(--gold)', textAlign:'right'}}>
                            <strong>{r.n}</strong> | <span style={{color:'var(--gold)'}}>{r.prof}</span><br/>
                            <small>{r.d}/{r.m}/{r.y} | {r.ts}</small>
                        </div>
                    ))}
                </div></div>
            );

            return (
                <div className="container" dir={t.dir}>
                    <div className="glass-card">
                        <div className="header"><h1>MAX STOCK</h1></div>
                        <div className="lang-bar">
                            {Object.keys(TXT).map(k => (
                                <button key={k} className={`btn-lang ${l === k ? 'active' : ''}`} onClick={() => setL(k)}>{k}</button>
                            ))}
                        </div>

                        {v === 'home' ? (
                            <div style={{textAlign:'center'}}>
                                <button className="btn-main" onClick={()=>setV('quiz')}>{t.start}</button>
                                <div className="admin-footer">
                                    <button className="btn-admin-access" onClick={() => { if(prompt('Pass?')==='1234') setV('admin'); }}>{t.admin}</button>
                                </div>
                            </div>
                        ) : v === 'done' ? (
                            <div style={{textAlign:'center'}}>
                                <h1 style={{fontSize:'4rem', color:'var(--gold)'}}>✔</h1>
                                <h2>{t.succ}</h2>
                                <button className="btn-main" onClick={()=>{setV('home'); setAns(Array(15).fill(null));}}>{t.back}</button>
                            </div>
                        ) : (
                            <div>
                                <div className="input-group"><label>{t.name}</label><input onChange={e=>setF({...f, n: e.target.value})} /></div>
                                <div className="input-group"><label>{t.dob}</label>
                                    <div className="dob-grid">
                                        <input placeholder={t.d} onChange={e=>setF({...f, d: e.target.value})} />
                                        <input placeholder={t.m} onChange={e=>setF({...f, m: e.target.value})} />
                                        <input placeholder={t.y} onChange={e=>setF({...f, y: e.target.value})} />
                                    </div>
                                </div>
                                {FULL_QUESTIONS.map((q, i) => (
                                    <div key={i} className="question-box">
                                        <p><strong>{i+1}. {q[l].q}</strong></p>
                                        <select onChange={e=>{const n=[...ans]; n[i]=parseInt(e.target.value); setAns(n)}}>
                                            <option value="">{t.sel}</option>
                                            {q[l].a.map((at, ai) => <option key={ai} value={ai}>{at}</option>)}
                                        </select>
                                    </div>
                                ))}
                                <button className="btn-main" onClick={send}>{t.sub}</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
