            --error: #ff4d4d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {

            justify-content: center;
            min-height: 100vh;

            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .brand-header { text-align: center; margin-bottom: 30px; }
        .brand-header h1 { 
            font-size: 2.5rem; 
            background: linear-gradient(135deg, var(--primary), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .lang-selector { display: flex; gap: 8px; justify-content: center; margin-bottom: 25px; flex-wrap: wrap; }
        .lang-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .lang-btn.active { background: var(--primary); color: var(--bg); }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--primary); font-weight: 500; font-size: 0.9rem; }
        input, select {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1rem;
            outline: none;
        }
        input:focus, select:focus { border-color: var(--primary); }
        option { background: var(--card-bg); color: white; }

        .question-card {
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 15px;
            border-right: 4px solid var(--primary);
        }

        .primary-btn {
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(201, 168, 76, 0.2);
        }

        .admin-entry {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(201,168,76,0.1);
        }

        [dir="ltr"] .question-card { border-right: none; border-left: 4px solid var(--primary); text-align: left; }
        [dir="ltr"] .input-group { text-align: left; }
        [dir="rtl"] .input-group { text-align: right; }
