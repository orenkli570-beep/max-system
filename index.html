<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX STOCK | לוח בקרה מנהל</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <style>
        :root { --gold: #c9a84c; --bg: #0f172a; --card: #1e293b; --danger: #ef4444; --success: #22c55e; }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        .dashboard { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid var(--gold); padding-bottom: 15px; }
        .header h1 { color: var(--gold); margin: 0; font-size: 2rem; }
        
        .filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        select, input { background: #000; color: #fff; border: 1px solid rgba(201,168,76,0.4); padding: 10px; border-radius: 8px; width: 100%; }

        .candidate-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .candidate-table th { text-align: right; padding: 15px; color: var(--gold); font-weight: 600; text-transform: uppercase; font-size: 0.85rem; }
        .candidate-row { background: var(--card); transition: 0.3s; }
        .candidate-row:hover { transform: scale(1.01); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .candidate-row td { padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .candidate-row td:first-child { border-radius: 0 15px 15px 0; }
        .candidate-row td:last-child { border-radius: 15px 0 0 15px; }

        .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .badge-fast { background: rgba(239, 68, 68, 0.15); color: var(--danger); border: 1px solid var(--danger); }
        .badge-solid { background: rgba(34, 197, 94, 0.15); color: var(--success); border: 1px solid var(--success); }

        .analysis-box { font-size: 0.9rem; line-height: 1.4; color: #cbd5e1; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; border-right: 3px solid var(--gold); }
        .interaction { margin-top: 10px; font-size: 0.85rem; display: flex; gap: 10px; flex-wrap: wrap; }
        .tag { background: rgba(201,168,76,0.1); color: var(--gold); padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const DEPARTMENTS = ["פלסטיקה", "חד פעמי", "כלי עבודה", "כלי מטבח", "כלי זכוכית", "טקסטיל", "דקורציה", "צעצועים", "ביוטי", "סלולר", "כלי כתיבה", "יצירה", "עונה", "הלבשה תחתונה, חיות מחמד וכלי רכב"];
        const ROLES = ["סדרן", "אחראי מחלקה", "אחראי משמרת", "עובד כללי", "מחסנאי", "מנהל מחסן", "בודק סחורה", "קופאית ראשית", "קופאית", "סגן מנהל"];

        const MOCK_DATA = [
            { id: 1, name: "משה לוי", age: 26, time: "01:45", status: "fast", dept: "צעצועים", role: "סדרן", analysis: "מועמד שמחפש לסיים משימות מהר. עלול לפספס פרטים קטנים בסידור המדף.", interaction: ["זקוק לפיקוח", "עבודה פיזית"] },
            { id: 2, name: "דנה כהן", age: 31, time: "04:12", status: "solid", dept: "כלי מטבח", role: "אחראית מחלקה", analysis: "ניתוח מראה על סבלנות גבוהה ושירותיות יוצאת דופן. מתאימה לניהול צוות קטן.", interaction: ["יחסי אנוש", "סדר וארגון"] }
        ];

        const AdminDashboard = () => {
            const [candidates, setCandidates] = useState(MOCK_DATA);

            return (
                <div className="dashboard">
                    <div className="header">
                        <h1>לוח ניהול מועמדים | MAX STOCK</h1>
                        <div style={{fontSize: '0.9rem', opacity: 0.7}}>עדכון אחרון: {new Date().toLocaleTimeString()}</div>
                    </div>

                    <div className="filters">
                        <select>
                            <option>כל המחלקות ({DEPARTMENTS.length})</option>
                            {DEPARTMENTS.map(d => <option key={d}>{d}</option>)}
                        </select>
                        <select>
                            <option>כל התפקידים</option>
                            {ROLES.map(r => <option key={r}>{r}</option>)}
                        </select>
                        <input type="text" placeholder="חיפוש לפי שם..." />
                    </div>

                    <table className="candidate-table">
                        <thead>
                            <tr>
                                <th>פרטי מועמד</th>
                                <th>שיבוץ (מחלקה/תפקיד)</th>
                                <th>מדד ביצוע</th>
                                <th>ניתוח אישיות (יהודה)</th>
                            </tr>
                        </thead>
                        <tbody>
                            {candidates.map(c => (
                                <tr key={c.id} className="candidate-row">
                                    <td>
                                        <div style={{fontWeight:'bold', fontSize:'1.1rem'}}>{c.name}</div>
                                        <div style={{opacity:0.6, fontSize:'0.9rem'}}>גיל: {c.age}</div>
                                    </td>
                                    <td>
                                        <div style={{color:'var(--gold)'}}>{c.dept}</div>
                                        <div style={{fontSize:'0.9rem'}}>{c.role}</div>
                                    </td>
                                    <td>
                                        <div className={`badge ${c.status === 'fast' ? 'badge-fast' : 'badge-solid'}`}>
                                            {c.time} - {c.status === 'fast' ? 'חשד לחפיף' : 'יסודי'}
                                        </div>
                                    </td>
                                    <td>
                                        <div className="analysis-box">{c.analysis}</div>
                                        <div className="interaction">
                                            {c.interaction.map(t => <span key={t} className="tag">#{t}</span>)}
                                        </div>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<AdminDashboard />);
    </script>
</body>
</html>
