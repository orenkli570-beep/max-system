<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAX STOCK | Multi-Language HR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <style>
        :root { --gold: #c9a84c; --bg: #0b0f1a; --card: #161e2d; --text: #f8fafc; --accent: #38bdf8; --success: #22c55e; }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 650px; margin: 0 auto; }
        .glass-card { background: var(--card); border: 1px solid var(--gold); border-radius: 20px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        /* Language Selector Styles */
        .lang-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .lang-btn { background: #000; border: 1px solid var(--gold); color: #fff; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: 0.3s; }
        .lang-btn.active { background: var(--gold); color: #000; font-weight: bold; }
        
        .header { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 25px; padding-bottom: 10px; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; background: #000; color: #fff; margin-bottom: 15px; font-size: 1rem; }
        .q-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 15px; border-right: 4px solid var(--gold); }
        .btn-main { width: 100%; padding: 20px; background: var(--gold); color: #000; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 1.2rem; }
        
        .admin-card { background: #1e293b; border-radius: 18px; padding: 20px; margin-bottom: 25px; border: 1px solid #444; }
        .status-buttons { display: flex; gap: 5px; margin-top: 15px; }
        .btn-status { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #444; background: #0f172a; color: #fff; cursor: pointer; }
        .btn-status.active { background: var(--gold); color: #000; }
        .footer-link { text-align: center; margin-top: 30px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const ADMIN_PASS = "MAX2026";

        const TRANSLATIONS = {
            HE: {
                title: "שאלון מועמד", fname: "שם פרטי", lname: "שם משפחה", bday: "תאריך לידה", send: "סיום ושליחה", select: "בחר תשובה...",
                questions: [
                    { q: "לקוח מחפש מוצר שחסר על המדף?", a: ["אבדוק במחסן", "אבדוק במחשב", "אכוון לדומה", "אמשיך בעבודתי"] },
                    { q: "תור ארוך מאוד בקופות?", a: ["אגש מיד לעזור", "אחכה שיקראו לי", "אסיים קודם מדף", "אלך למחסן"] },
                    { q: "ראית מוצר שבור או נוזל?", a: ["אנקה מיד", "אדווח למנהל", "אקרא לניקיון", "אעקוף"] },
                    { q: "איזו צורת עבודה אתה מעדיף?", a: ["אחריות עצמאית", "עבודת צוות", "שיגידו לי מה לעשות", "שקט במחסן"] },
                    { q: "מה הכי חשוב לך בעבודה?", a: ["שירות מעולה", "קידום לניהול", "סדר וארגון", "המשכורת והשקט"] }
                ]
            },
            EN: {
                title: "Candidate Questionnaire", fname: "First Name", lname: "Last Name", bday: "Date of Birth", send: "Submit", select: "Choose...",
                questions: [
                    { q: "Customer looking for a missing item?", a: ["Check warehouse", "Check computer", "Suggest alternative", "Continue working"] },
                    { q: "Long lines at checkout?", a: ["Go help immediately", "Wait to be called", "Finish my shelf first", "Go to warehouse"] },
                    { q: "Found a broken/leaking product?", a: ["Clean it immediately", "Report to manager", "Call cleaning staff", "Ignore it"] },
                    { q: "Preferred work style?", a: ["Independent responsibility", "Teamwork", "Follow instructions", "Quiet warehouse"] },
                    { q: "Most important at work?", a: ["Great service", "Career growth", "Order and organization", "Salary and peace"] }
                ]
            },
            RU: {
                title: "Анкета кандидата", fname: "Имя", lname: "Фамилия", bday: "Дата рождения", send: "Отправить", select: "Выберите...",
                questions: [
                    { q: "Клиент ищет товар, которого нет?", a: ["Проверю склад", "Проверю в базе", "Предложу аналог", "Продолжу работу"] },
                    { q: "Длинная очередь на кассе?", a: ["Помогу сразу", "Подожду вызова", "Закончу полку", "Уйду на склад"] },
                    { q: "Увидели разбитый товар?", a: ["Уберу сразу", "Сообщу менеджеру", "Вызову уборку", "Пройду мимо"] },
                    { q: "Предпочитаемый стиль?", a: ["Самостоятельность", "Работа в команде", "Четкие указания", "Тишина на складе"] },
                    { q: "Что важнее всего?", a: ["Сервис", "Карьерный рост", "Порядок", "Зарплата и покой"] }
                ]
            },
            AR: {
                title: "استبيان الموظف", fname: "الاسم الشخصي", lname: "اسم العائلة", bday: "تاريخ الميلاد", send: "إرسال", select: "اختر...",
                questions: [
                    { q: "زبون يبحث عن منتج مفقود؟", a: ["سأفحص المخزن", "سأفحص الحاسوب", "سأقترح بديل", "سأكمل عملي"] },
                    { q: "طابور طويل عند الخروج؟", a: ["سأساعد فوراً", "سأنتظر النداء", "سأنهي الرف أولاً", "سأذهب للمخزن"] },
                    { q: "رأيت منتج مكسور أو تسريب؟", a: ["سأنظف فوراً", "سأبلغ المدير", "سأنادي التنظيف", "سأتجاهل"] },
                    { q: "أسلوب العمل المفضل؟", a: ["مسؤولية مستقلة", "عمل جماعي", "تلقي الأوامر", "هدوء المخزن"] },
                    { q: "الأهم بالنسبة لك؟", a: ["خدمة ممتازة", "ترقية إدارية", "ترتيب ونظام", "الراتب والهدوء"] }
                ]
            },
            TH: {
                title: "แบบสอบถามผู้สมัคร", fname: "ชื่อ", lname: "นามสกุล", bday: "วันเกิด", send: "ส่งข้อมูล", select: "เลือกตอบ...",
                questions: [
                    { q: "ลูกค้าหาสินค้าไม่เจอ?", a: ["เช็คสต็อก", "เช็คคอมพิวเตอร์", "แนะนำอย่างอื่น", "ทำงานต่อ"] },
                    { q: "คิวยาวที่แคชเชียร์?", a: ["ช่วยทันที", "รอเรียก", "จัดของต่อ", "ไปหลังร้าน"] },
                    { q: "เจอของแตกหรือรั่ว?", a: ["ทำความสะอาดทันที", "บอกผู้จัดการ", "เรียกแม่บ้าน", "เดินผ่าน"] },
                    { q: "รูปแบบงานที่ชอบ?", a: ["ทำเองคนเดียว", "ทำเป็นทีม", "รอสั่งงาน", "ทำเงียบๆ ในคลัง"] },
                    { q: "สิ่งสำคัญที่สุด?", a: ["บริการลูกค้า", "ความก้าวหน้า", "ความเป็นระเบียบ", "เงินเดือนและความสงบ"] }
                ]
            }
        };

        const App = () => {
            const [lang, setLang] = useState('HE');
            const [view, setView] = useState('quiz');
            const [candidates, setCandidates] = useState([]);
            const [form, setForm] = useState({ fn: '', ln: '', bday: '' });
            const [answers, setAnswers] = useState({});

            const handleSend = () => {
                const newCand = {
                    id: Date.now(),
                    ...form,
                    name: `${form.fn} ${form.ln}`,
                    lang: lang,
                    status: 'חדש'
                };
                setCandidates([newCand, ...candidates]);
                setView('done');
            };

            const isRTL = lang === 'HE' || lang === 'AR';

            if (view === 'admin') return (
                <div className="container" dir="rtl">
                    <header className="header"><h1>לוח מנהל (עברית בלבד)</h1></header>
                    <button className="lang-btn" onClick={()=>setView('quiz')}>חזרה לשאלון</button>
                    {candidates.map(c => (
                        <div key={c.id} className="admin-card">
                            <h3>{c.name} (שפת מילוי: {c.lang})</h3>
                            <p>תאריך לידה: {c.bday}</p>
                            <div className="status-buttons">
                                {['חדש', 'זומן', 'התקבל'].map(s => (
                                    <button key={s} className={`btn-status ${c.status === s ? 'active' : ''}`} onClick={()=>setCandidates(candidates.map(can=>can.id===c.id?{...can, status:s}:can))}>{s}</button>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            );

            if (view === 'done') return (
                <div className="container" style={{textAlign:'center', paddingTop:100}}>
                    <div className="glass-card"><h1>✓</h1><h2>תודה, הפרטים נשלחו!</h2><button className="btn-main" onClick={()=>setView('quiz')}>מועמד חדש</button></div>
                </div>
            );

            return (
                <div className="container" dir={isRTL ? 'rtl' : 'ltr'}>
                    <div className="glass-card">
                        <div className="lang-bar">
                            {Object.keys(TRANSLATIONS).map(l => (
                                <button key={l} className={`lang-btn ${lang === l ? 'active' : ''}`} onClick={()=>setLang(l)}>{l}</button>
                            ))}
                        </div>
                        <header className="header"><h1>{TRANSLATIONS[lang].title}</h1></header>
                        <input placeholder={TRANSLATIONS[lang].fname} onChange={e=>setForm({...form, fn:e.target.value})} />
                        <input placeholder={TRANSLATIONS[lang].lname} onChange={e=>setForm({...form, ln:e.target.value})} />
                        <label style={{fontSize:'0.8rem'}}>{TRANSLATIONS[lang].bday}:</label>
                        <input type="date" onChange={e=>setForm({...form, bday:e.target.value})} />

                        {TRANSLATIONS[lang].questions.map((q, i) => (
                            <div key={i} className="q-card">
                                <p><strong>{q.q}</strong></p>
                                <select onChange={e=>setAnswers({...answers, [i]:e.target.value})}>
                                    <option value="">{TRANSLATIONS[lang].select}</option>
                                    {q.a.map((ans, idx) => <option key={idx} value={idx}>{ans}</option>)}
                                </select>
                            </div>
                        ))}
                        <button className="btn-main" onClick={handleSend}>{TRANSLATIONS[lang].send}</button>
                        <div className="footer-link">
                            <button style={{background:'none', border:'none', color:'#444', cursor:'pointer'}} onClick={()=>{
                                const p = prompt("Password:");
                                if(p === ADMIN_PASS) setView('admin');
                            }}>Admin Login</button>
                        </div>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
