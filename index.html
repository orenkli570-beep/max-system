<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX STOCK | OREN PROTOCOL PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <style>
        :root { --gold: #c9a84c; --bg: #0f172a; --card: rgba(30, 41, 59, 0.95); }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: #fff; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 650px; padding-bottom: 50px; }
        .glass-card { background: var(--card); border: 1px solid rgba(201,168,76,0.3); border-radius: 28px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .header h1 { color: var(--gold); text-align: center; font-size: 2.2rem; margin: 10px 0; letter-spacing: 2px; }
        .lang-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-lang { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 14px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-lang.active { background: var(--gold); color: #000; }
        .input-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 5px; color: var(--gold); font-weight: 600; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: #000; color: #fff; font-size: 1rem; }
        .dob-grid { display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 8px; }
        .question-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 18px; margin-bottom: 15px; border-right: 4px solid var(--gold); text-align: right; }
        .btn-main { width: 100%; padding: 18px; background: var(--gold); color: #000; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        .btn-main:hover { transform: scale(1.02); }
        .success-screen { text-align: center; padding: 40px 0; }
        [dir="ltr"] .question-box { border-right: none; border-left: 4px solid var(--gold); text-align: left; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const TXT = {
            HE: { dir: 'rtl', start: 'התחל שאלון גיוס', name: 'שם המועמד מלא', dob: 'תאריך לידה מלא', d: 'יום', m: 'חודש', y: 'שנה', sel: 'בחר תשובה...', sub: 'שלח שאלון למערכת', succ: 'השאלון נשלח בהצלחה!', back: 'חזרה לדף הבית' },
            EN: { dir: 'ltr', start: 'Start Application', name: 'Full Name', dob: 'Full Date of Birth', d: 'Day', m: 'Month', y: 'Year', sel: 'Select answer...', sub: 'Submit Application', succ: 'Submitted Successfully!', back: 'Back to Home' },
            RU: { dir: 'ltr', start: 'Начать анкету', name: 'ФИО', dob: 'Дата рождения', d: 'День', m: 'Месяц', y: 'Год', sel: 'Выберите ответ...', sub: 'Отправить анкету', succ: 'Успешно отправлено!', back: 'На главную' },
            AR: { dir: 'rtl', start: 'ابدأ الاستبيان', name: 'الاسم الكامل', dob: 'تاريخ الميلاد الكامل', d: 'يوم', m: 'شهر', y: 'سنة', sel: 'اختر إجابة...', sub: 'إرسال الاستبيان', succ: 'تم الإرسال بنجاح!', back: 'العودة לרף הבית' },
            TH: { dir: 'ltr', start: 'เริ่มใบสมัคร', name: 'ชื่อ-นามสกุล', dob: 'วันเกิด', d: 'วัน', m: 'เดือน', y: 'ปี', sel: 'เลือกคำตอบ...', sub: 'ส่งใบสมัคร', succ: 'ส่งข้อมูลสำเร็จ!', back: 'กลับหน้าหลัก' }
        };

        const Q_LIST = [
            { q: "לקוח מחפש מוצר שחסר על המדף. מה תעשה?", a: ["אבדוק במחסן ואביא לו אישית", "אבדוק במחשב אם קיים במלאי", "אגיד שחסר ואכוון למוצר דומה", "אמשיך בעבודתי הרגילה"] },
            { q: "יש תור ארוך מאוד בקופות ואתה בסידור מדף?", a: ["אגש מיד לעזור בקופה בלי שיקראו לי", "אחכה שיקראו לי לעזור", "אמשיך לסדר עד שאסיים", "אלך למחסן כדי לא להפריע"] },
            { q: "ראית מוצר שבור או נוזל על הרצפה במעבר?", a: ["אנקה מיד ואדאג לבטיחות", "אדווח למנהל המשמרת", "אקרא לעובד ניקיון", "אעקוף את המפגע"] },
            { q: "לקוח מתלונן בקול רם על מחיר גבוה?", a: ["אקשיב בסבלנות ואסביר בנועם", "אפנה אותו למנהל הסניף", "אגיד שזה המחיר ואין מה לעשות", "אתעלם ואעבור מחלקה"] },
            { q: "המנהל נתן לך משימה שאתה פחות אוהב?", a: ["אבצע אותה הכי טוב ומהר", "אבצע ואז אבקש לגוון", "אעשה לאט כדי שלא יבקשו שוב", "אנסה למצוא עובד שיחליף אותי"] },
            { q: "חבר לעבודה טעה בסידור המחלקה?", a: ["אעזור לו לתקן בנעימות", "אסב את תשומת ליבו לטעות", "אדווח למנהל על הטעות", "לא ענייני, כל אחד אחראי על שלו"] },
            { q: "הגעת למשמרת והמחלקה הפוכה לגמרי?", a: ["אתחיל לסדר מיד לפי דחיפות", "אשאל את המנהל מאיפה להתחיל", "אסדר רק את האזור שלי", "אחכה שמישהו יגיד לי מה לעשות"] },
            { q: "לקוח מתלבט זמן רב לגבי קניית מתנה?", a: ["אציע לו אפשרויות ואעזור לו", "אכוון אותו לאזור הכללי", "אגיד שזה עניין של טעם", "אפנה אותו לעובד אחר"] },
            { q: "מצאת שטר כסף על הרצפה בתוך החנות?", a: ["אמסור מיד למנהל או לקופה", "אשאל לקוחות אם מישהו איבד", "אשים אותו בקופת צדקה", "אשמור אותו בכיס"] },
            { q: "איזו צורת עבודה אתה הכי מעדיף?", a: ["עבודה עם אחריות שבה אני רץ לבד", "עבודה בצוות עם שיתוף פעולה", "עבודה שאומרים לי בדיוק מה לעשות", "עבודה שקטה במחסן"] },
            { q: "לקוח דורש הנחה שאי אפשר לתת?", a: ["אסביר בנימוס את מדיניות הרשת", "אבדוק אם יש מבצע חלופי", "אשלח אותו להתווכח עם המנהל", "אגיד פשוט 'אין הנחות'"] },
            { q: "סימנת מחיר טעות על קבוצת מוצרים?", a: ["אתקן מיד ואדווח למנהל", "אשאל את המנהל מה לעשות", "אקווה שאף אחד לא ישים לב", "אשאיר את זה ככה"] },
            { q: "המשמרת נגמרה והחנות עמוסה מאוד?", a: ["אשאר עוד כמה דקות לעזור", "אסיים את המשימה ואלך", "אצא מיד - השעה הגיעה", "אלך בלי להגיד כלום"] },
            { q: "עובד אחר מבקש לעשות משהו לא תקין?", a: ["אסרב בנימוס ואסביר לו", "אדווח על כך למנהל", "אזרום איתו פעם אחת", "אעשה מה שביקש"] },
            { q: "מה הדבר שהכי חשוב לך בעבודה?", a: ["להתקדם לתפקידי ניהול", "שירות מעולה ללקוח", "סדר וארגון במשימות", "המשכורת והשקט שלי"] }
        ];

        const App = () => {
            const [v, setV] = useState('home');
            const [l, setL] = useState('HE');
            const [ans, setAns] = useState(Array(15).fill(null));
            const [f, setF] = useState({ n: '', d: '', m: '', y: '' });
            const [db, setDb] = useState([]);

            useEffect(() => {
                const s = localStorage.getItem('MAX_V5_FINAL');
                if (s) setDb(JSON.parse(s));
            }, []);

            const send = () => {
                if (!f.n || !f.y || ans.includes(null)) return alert("נא למלא את כל הפרטים ולענות על כל השאלות");
                const score = ans.filter(a => a === 0).length;
                const prof = score >= 10 ? "יוזמה גבוהה" : score >= 6 ? "ביצועיסט" : "משימתי";
                const newRec = { ...f, prof, ts: new Date().toLocaleString() };
                const up = [...db, newRec];
                setDb(up); localStorage.setItem('MAX_V5_FINAL', JSON.stringify(up));
                setV('done');
            };

            const t = TXT[l];

            if (v === 'done') return (
                <div className="container" dir={t.dir}><div className="glass-card success-screen">
                    <h1 style={{fontSize:'5rem', color:'var(--gold)', margin:0}}>✔</h1>
                    <h2 style={{color:'var(--gold)'}}>{t.succ}</h2>
                    <p style={{opacity:0.8, marginBottom:30}}>תודה רבה, המתן לנציג שלנו.</p>
                    <button className="btn-main" onClick={()=> { setV('home'); setAns(Array(15).fill(null)); }}>{t.back}</button>
                </div></div>
            );

            if (v === 'admin') return (
                <div className="container" dir="rtl"><div className="glass-card">
                    <h2 style={{color:'var(--gold)'}}>ניהול מועמדים ({db.length})</h2>
                    <button onClick={()=>setV('home')} className="btn-lang" style={{marginBottom:20}}>חזרה</button>
                    {db.map((r, i) => (
                        <div key={i} style={{background:'rgba(0,0,0,0.3)', padding:15, borderRadius:12, marginBottom:10, borderRight:'4px solid var(--gold)'}}>
                            <strong>{r.n}</strong> | <span style={{color:'var(--gold)'}}>{r.prof}</span><br/>
                            <small>{r.d}/{r.m}/{r.y} | {r.ts}</small>
                        </div>
                    ))}
                </div></div>
            );

            return (
                <div className="container" dir={t.dir}>
                    <div className="glass-card">
                        <div className="header"><h1>MAX STOCK</h1></div>
                        <div className="lang-bar">
                            {Object.keys(TXT).map(k => (
                                <button key={k} className={`btn-lang ${l === k ? 'active' : ''}`} onClick={() => setL(k)}>{k}</button>
                            ))}
                        </div>

                        {v === 'home' ? (
                            <button className="btn-main" onClick={()=>setV('quiz')}>{t.start}</button>
                        ) : (
                            <div>
                                <div className="input-group">
                                    <label>{t.name}</label>
                                    <input placeholder="הכנס שם מלא" onChange={e=>setF({...f, n: e.target.value})} />
                                </div>
                                <div className="input-group">
                                    <label>{t.dob}</label>
                                    <div className="dob-grid">
                                        <input placeholder={t.d} onChange={e=>setF({...f, d: e.target.value})} />
                                        <input placeholder={t.m} onChange={e=>setF({...f, m: e.target.value})} />
                                        <input placeholder={t.y} onChange={e=>setF({...f, y: e.target.value})} />
                                    </div>
                                </div>
                                {Q_LIST.map((q, i) => (
                                    <div key={i} className="question-box">
                                        <p style={{fontSize:'1.1rem'}}><strong>{i+1}. {q.q}</strong></p>
                                        <select style={{marginTop:10}} onChange={e=>{const n=[...ans]; n[i]=parseInt(e.target.value); setAns(n)}}>
                                            <option value="">{t.sel}</option>
                                            {q.a.map((at, ai) => (
                                                <option key={ai} value={ai}>{at}</option>
                                            ))}
                                        </select>
                                    </div>
                                ))}
                                <button className="btn-main" onClick={send}>{t.sub}</button>
                            </div>
                        )}
                        <div style={{marginTop:40, opacity:0.01, cursor:'pointer', textAlign:'center'}} onClick={()=>{if(prompt('!')==='1234') setV('admin')}}>Admin</div>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
