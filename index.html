<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX STOCK | OREN PROTOCOL FULL DEPT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <style>
        :root { --gold: #c9a84c; --bg: #0f172a; --card: rgba(30, 41, 59, 0.95); }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: #fff; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 900px; padding-bottom: 50px; }
        .glass-card { background: var(--card); border: 1px solid rgba(201,168,76,0.3); border-radius: 28px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .header h1 { color: var(--gold); text-align: center; font-size: 2rem; margin: 10px 0; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        .admin-table th, .admin-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: right; }
        .badge { padding: 4px 8px; border-radius: 12px; font-weight: bold; font-size: 0.75rem; color: #000; background: var(--gold); }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .question-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 10px; border-right: 4px solid var(--gold); }
        input, select { width: 100%; padding: 12px; border-radius: 10px; background: #000; color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .btn-main { width: 100%; padding: 18px; background: var(--gold); color: #000; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const DEPTS = ["צעצועים", "בית ונוי", "מטבח", "יצירה", "חשמל", "טקסטיל", "ניקיון", "קוסמטיקה", "גינה", "חד פעמי", "חזרה לביה\"ס", "ריהוט", "מחסן"];
        const ROLES = ["קופאי/ת", "סדרן/ית", "מחסנאי/ת", "מנהל/ת מחלקה", "סגן/ית מנהל", "מנהל/ת סניף", "אחראי/ת משמרת", "שירות לקוחות", "עובד/ת כללי", "ניקיון", "אבטחה", "מוביל/ה", "מלקט/ת", "בודק/ת חשבוניות", "אחראי/ת החזרות"];

        const Q_LIST = [
            { q: "לקוח מחפש מוצר שחסר על המדף. מה תעשה?", a: ["אבדוק במחסן ואביא לו אישית", "אבדוק במחשב אם קיים במלאי", "אגיד שחסר ואכוון למוצר דומה", "אמשיך בעבודתי הרגילה"] },
            { q: "יש תור ארוך מאוד בקופות ואתה בסידור מדף?", a: ["אגש מיד לעזור בקופה בלי שיקראו לי", "אחכה שיקראו לי לעזור", "אמשיך לסדר עד שאסיים", "אלך למחסן כדי לא להפריע"] },
            { q: "ראית מוצר שבור או נוזל על הרצפה במעבר?", a: ["אנקה מיד ואדאג לבטיחות", "אדווח למנהל המשמרת", "אקרא לעובד ניקיון", "אעקוף את המפגע"] },
            { q: "לקוח מתלונן בקול רם על מחיר גבוה?", a: ["אקשיב בסבלנות ואסביר בנועם", "אפנה אותו למנהל הסניף", "אגיד שזה המחיר ואין מה לעשות", "אתעלם ואעבור מחלקה"] },
            { q: "המנהל נתן לך משימה שאתה פחות אוהב?", a: ["אבצע אותה הכי טוב ומהר", "אבצע ואז אבקש לגוון", "אעשה לאט כדי שלא יבקשו שוב", "אנסה למצוא עובד שיחליף אותי"] },
            { q: "חבר לעבודה טעה בסידור המחלקה?", a: ["אעזור לו לתקן בנעימות", "אסב את תשומת ליבו לטעות", "אדווח למנהל על הטעות", "לא ענייני, כל אחד אחראי על שלו"] },
            { q: "הגעת למשמרת והמחלקה הפוכה לגמרי?", a: ["אתחיל לסדר מיד לפי דחיפות", "אשאל את המנהל מאיפה להתחיל", "אסדר רק את האזור שלי", "אחכה שמישהו יגיד לי מה לעשות"] },
            { q: "לקוח מתלבט זמן רב לגבי קניית מתנה?", a: ["אציע לו אפשרויות ואעזור לו", "אכוון אותו לאזור הכללי", "אגיד שזה עניין של טעם", "אפנה אותו לעובד אחר"] },
            { q: "מצאת שטר כסף על הרצפה בתוך החנות?", a: ["אמסור מיד למנהל או לקופה", "אשאל לקוחות אם מישהו איבד", "אשים אותו בקופת צדקה", "אשמור אותו בכיס"] },
            { q: "איזו צורת עבודה אתה הכי מעדיף?", a: ["עבודה עם אחריות שבה אני רץ לבד", "עבודה בצוות עם שיתוף פעולה", "עבודה שאומרים לי בדיוק מה לעשות", "עבודה שקטה במחסן"] },
            { q: "לקוח דורש הנחה שאי אפשר לתת?", a: ["אסביר בנימוס את מדיניות הרשת", "אבדוק אם יש מבצע חלופי", "אשלח אותו להתווכח עם המנהל", "אגיד פשוט 'אין הנחות'"] },
            { q: "סימנת מחיר טעות על קבוצת מוצרים?", a: ["אתקן מיד ואדווח למנהל", "אשאל את המנהל מה לעשות", "אקווה שאף אחד לא ישים לב", "אשאיר את זה ככה"] },
            { q: "המשמרת נגמרה והחנות עמוסה מאוד?", a: ["אשאר עוד כמה דקות לעזור", "אסיים את המשימה ואלך", "אצא מיד - השעה הגיעה", "אלך בלי להגיד כלום"] },
            { q: "עובד אחר מבקש לעשות משהו לא תקין?", a: ["אסרב בנימוס ואסביר לו", "אדווח על כך למנהל", "אזרום איתו פעם אחת", "אעשה מה שביקש"] },
            { q: "מה הדבר שהכי חשוב לך בעבודה?", a: ["להתקדם לתפקידי ניהול", "שירות מעולה ללקוח", "סדר וארגון במשימות", "המשכורת והשקט שלי"] }
        ];

        const App = () => {
            const [v, setV] = useState('home');
            const [ans, setAns] = useState(Array(15).fill(null));
            const [f, setF] = useState({ n: '', d: '', m: '', y: '', dept: '', role: '' });
            const [db, setDb] = useState([]);

            useEffect(() => {
                const s = localStorage.getItem('MAX_DB_FINAL_V1');
                if (s) setDb(JSON.parse(s));
            }, []);

            const save = () => {
                if (!f.n || !f.dept || !f.role || ans.includes(null)) return alert("נא למלא את כל השדות ולענות על כל השאלות");
                const score = ans.filter(a => a === 0).length;
                const prof = score >= 10 ? "יוזמה גבוהה" : score >= 6 ? "ביצועיסט" : "משימתי";
                const up = [...db, { ...f, score, prof, ts: new Date().toLocaleString() }];
                setDb(up); localStorage.setItem('MAX_DB_FINAL_V1', JSON.stringify(up));
                setV('done');
            };

            if (v === 'admin') return (
                <div className="container" dir="rtl"><div className="glass-card">
                    <h2 style={{color:'var(--gold)'}}>לוח מנהל - סינון ושיבוץ</h2>
                    <button onClick={()=>setV('home')} className="btn-main" style={{width:'auto', padding:'8px 20px', marginBottom:20}}>חזרה</button>
                    <table className="admin-table">
                        <thead>
                            <tr>
                                <th>מועמד</th>
                                <th>מחלקה</th>
                                <th>תפקיד</th>
                                <th>פרופיל</th>
                                <th>ציון</th>
                            </tr>
                        </thead>
                        <tbody>
                            {db.map((r, i) => (
                                <tr key={i}>
                                    <td><strong>{r.n}</strong><br/><small>{r.y}</small></td>
                                    <td>{r.dept}</td>
                                    <td>{r.role}</td>
                                    <td><span className="badge">{r.prof}</span></td>
                                    <td>{r.score}/15</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div></div>
            );

            return (
                <div className="container" dir="rtl">
                    <div className="glass-card">
                        <div className="header"><h1>MAX STOCK</h1></div>
                        {v === 'home' ? (
                            <div style={{textAlign:'center'}}>
                                <button className="btn-main" onClick={()=>setV('quiz')}>התחל שאלון גיוס</button>
                                <p style={{marginTop:30, opacity:0.3, cursor:'pointer'}} onClick={()=>{if(prompt('סיסמה:')==='1234') setV('admin')}}>כניסת מנהל 🔒</p>
                            </div>
                        ) : v === 'done' ? (
                            <div style={{textAlign:'center'}}><h1>✔</h1><h2>השאלון נשלח!</h2><button className="btn-main" onClick={()=>setV('home')}>חזרה</button></div>
                        ) : (
                            <div>
                                <div className="input-grid">
                                    <input placeholder="שם מלא" onChange={e=>setF({...f, n: e.target.value})} />
                                    <input placeholder="שנת לידה" onChange={e=>setF({...f, y: e.target.value})} />
                                </div>
                                <div className="input-grid">
                                    <select onChange={e=>setF({...f, dept: e.target.value})}>
                                        <option value="">בחר מחלקה מועדפת...</option>
                                        {DEPTS.map(d => <option key={d} value={d}>{d}</option>)}
                                    </select>
                                    <select onChange={e=>setF({...f, role: e.target.value})}>
                                        <option value="">בחר תפקיד מבוקש...</option>
                                        {ROLES.map(r => <option key={r} value={r}>{r}</option>)}
                                    </select>
                                </div>
                                {Q_LIST.map((q, i) => (
                                    <div key={i} className="question-box">
                                        <p><strong>{i+1}. {q.q}</strong></p>
                                        <select onChange={e=>{const n=[...ans]; n[i]=parseInt(e.target.value); setAns(n)}}>
                                            <option value="">בחר תשובה...</option>
                                            {q.a.map((at, ai) => <option key={ai} value={ai}>{at}</option>)}
                                        </select>
                                    </div>
                                ))}
                                <button className="btn-main" onClick={save}>שלח שאלון</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
