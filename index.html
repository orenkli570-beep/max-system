<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX STOCK | ניהול מועמדים</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <style>
        :root { --gold: #c9a84c; --bg: #0f172a; --card: #1e293b; --danger: #ef4444; --success: #22c55e; }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: #fff; margin: 0; padding: 15px; }
        
        .admin-header { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 20px; }
        .admin-header h1 { color: var(--gold); font-size: 1.6rem; margin: 0; }

        /* תיקון השגיאה - שימוש בכרטיס במקום טבלה */
        .candidate-card { 
            background: var(--card); 
            border-radius: 18px; 
            padding: 15px; 
            margin-bottom: 15px; 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .card-row-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .candidate-name { font-size: 1.2rem; font-weight: bold; color: #fff; }
        
        /* עיצוב מדד הביצוע כדי שלא יעלה אחד על השני */
        .status-badge { 
            padding: 5px 12px; 
            border-radius: 10px; 
            font-size: 0.85rem; 
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 90px;
        }
        .badge-fast { background: rgba(239, 68, 68, 0.2); color: var(--danger); border: 1px solid var(--danger); }
        .badge-solid { background: rgba(34, 197, 94, 0.2); color: var(--success); border: 1px solid var(--success); }
        .time-label { font-size: 0.7rem; opacity: 0.8; margin-top: 2px; }

        .assignment-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        select { background: #000; color: #fff; border: 1px solid var(--gold); padding: 8px; border-radius: 8px; font-size: 0.85rem; }

        /* ניתוח יהודה */
        .analysis-area { 
            background: rgba(0,0,0,0.2); 
            padding: 12px; 
            border-radius: 12px; 
            border-right: 3px solid var(--gold);
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .analysis-label { color: var(--gold); font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const DEPARTMENTS = ["פלסטיקה", "חד פעמי", "כלי עבודה", "כלי מטבח", "טקסטיל", "דקורציה", "צעצועים", "ביוטי", "סלולר", "כלי כתיבה", "יצירה", "עונה"];
        const ROLES = ["סדרן", "אחראי מחלקה", "אחראי משמרת", "עובד כללי", "מחסנאי", "קופאית"];

        const MOCK_DATA = [
            { id: 1, name: "ישראל ישראלי", age: 24, time: "01:45", status: "fast", analysis: "מועמד מהיר מאוד, עלול להיות פחות יסודי בפרטים. מתאים למחלקות עם קצב גבוה." },
            { id: 2, name: "שרה לוי", age: 31, time: "05:12", status: "solid", analysis: "מועמדת יסודית ושירותית. מתאימה מאוד לתפקידי ניהול מחלקה או קופה." }
        ];

        const ManagerView = () => {
            return (
                <div className="admin-container">
                    <div className="admin-header">
                        <h1>לוח מנהל - סיכום מועמדים</h1>
                    </div>

                    {MOCK_DATA.map(c => (
                        <div key={c.id} className="candidate-card">
                            <div className="card-row-top">
                                <div>
                                    <div className="candidate-name">{c.name}</div>
                                    <div style={{fontSize: '0.85rem', opacity: 0.7}}>גיל: {c.age}</div>
                                </div>
                                <div className={`status-badge ${c.status === 'fast' ? 'badge-fast' : 'badge-solid'}`}>
                                    {c.status === 'fast' ? 'חשד לחפיף' : 'יסודי'}
                                    <span className="time-label">{c.time} דקות</span>
                                </div>
                            </div>

                            <div className="assignment-row">
                                <select><option>מחלקה...</option>{DEPARTMENTS.map(d=><option key={d}>{d}</option>)}</select>
                                <select><option>תפקיד...</option>{ROLES.map(r=><option key={r}>{r}</option>)}</select>
                            </div>

                            <div className="analysis-area">
                                <span className="analysis-label">ניתוח יהודה:</span>
                                {c.analysis}
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<ManagerView />);
    </script>
</body>
</html>
