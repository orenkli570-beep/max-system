                        </div>
                        <header className="header"><h1>{TRANSLATIONS[lang].title}</h1></header>
                        <input placeholder={TRANSLATIONS[lang].fname} value={form.fn} onChange={e=>setForm({...form, fn:e.target.value})} />
                        <input placeholder={TRANSLATIONS[lang].lname} value={form.ln} onChange={e=>setForm({...form, ln:e.target.value})} />
                        <label style={{fontSize:'0.8rem'}}>{TRANSLATIONS[lang].bday}:</label>
                        <input type="date" value={form.bday} onChange={e=>setForm({...form, bday:e.target.value})} />

                        {TRANSLATIONS[lang].questions.map((q, i) => (
                            <div key={i} className="q-card">
                                <p><strong>{q.q}</strong></p>
                                <select onChange={e=>setAnswers({...answers, [i]:e.target.value})}>
                                    <option value="">{TRANSLATIONS[lang].select}</option>
                                    {q.a.map((ans, idx) => <option key={idx} value={idx}>{ans}</option>)}
                                </select>
                            </div>
                        ))}
                        <button className="btn-main" onClick={handleSend}>{TRANSLATIONS[lang].send}</button>
                        <div className="footer-link" style={{marginTop:20, textAlign:'center'}}>
                            <button style={{background:'none', border:'none', color:'#444', cursor:'pointer'}} onClick={()=>{
                                if(prompt("Pass:") === ADMIN_PASS) setView('admin');
                            }}>Admin Login</button>
                        </div>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
