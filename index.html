<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX STOCK | חיבור עובדים וניהול גיוס</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <style>
        :root { --gold: #c9a84c; --bg: #0b0f1a; --card: #161e2d; --text: #f8fafc; --accent: #38bdf8; --success: #22c55e; --pink: #f472b6; }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        
        .container { max-width: 700px; margin: 0 auto; }
        .glass-card { background: var(--card); border: 1px solid var(--gold); border-radius: 20px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .header h1 { color: var(--gold); text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; background: #000; color: #fff; margin-bottom: 15px; }
        .q-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 12px; border-right: 4px solid var(--gold); }
        
        /* לוח מנהל אינטראקטיבי */
        .admin-card { background: #1e293b; border-radius: 18px; padding: 20px; margin-bottom: 30px; border: 1px solid #444; }
        .section-title { font-size: 0.9rem; color: var(--gold); font-weight: bold; margin: 15px 0 10px; display: flex; align-items: center; gap: 5px; }
        
        .interaction-box { background: rgba(56, 189, 248, 0.07); padding: 15px; border-radius: 12px; border: 1px solid rgba(56, 189, 248, 0.2); }
        .buddy-selector { background: rgba(244, 114, 182, 0.07); padding: 15px; border-radius: 12px; border: 1px solid rgba(244, 114, 182, 0.2); margin-top: 10px; }
        
        .check-item { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; margin-bottom: 8px; cursor: pointer; }
        .check-item input { width: auto; margin: 0; }

        .analysis-text { font-size: 1rem; color: #e2e8f0; line-height: 1.5; background: #000; padding: 12px; border-radius: 10px; margin: 10px 0; }
        .btn-status { flex: 1; padding: 10px; font-size: 0.8rem; border-radius: 8px; border: 1px solid #444; cursor: pointer; background: #0f172a; color: #fff; }
        .btn-status.active { background: var(--gold); color: #000; font-weight: bold; }
        
        .btn-main { width: 100%; padding: 18px; background: var(--gold); color: #000; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const ADMIN_PASS = "MAX2026";

        const STAFF_VETERANS = ["יוסי (אחראי משמרת)", "מיכל (קופות)", "אחמד (מחסן)", "דנה (טקסטיל)", "רוני (צעצועים)"];
        const DEPARTMENTS = ["פלסטיקה", "חד פעמי", "כלי עבודה", "כלי מטבח", "טקסטיל", "דקורציה", "צעצועים", "ביוטי", "סלולר", "כלי כתיבה", "יצירה", "עונה/חגים", "קופות", "מחסן"];

        const QUESTIONS = [
            { id: 1, q: "לקוח מחפש מוצר שחסר על המדף?", a: ["אבדוק במחסן", "אבדוק במחשב", "אכוון לדומה", "אמשיך בעבודתי"] },
            { id: 2, q: "תור ארוך מאוד בקופות ואתה בסידור מדף?", a: ["אגש מיד לעזור", "אחכה שיקראו לי", "אסיים קודם את המדף", "אלך למחסן"] },
            { id: 3, q: "ראית מוצר שבור או נוזל על הרצפה?", a: ["אנקה מיד", "אדווח למנהל", "אקרא לעובד ניקיון", "אעקוף את המפגע"] },
            { id: 4, q: "לקוח מתלונן בקול רם על מחיר גבוה?", a: ["אקשיב בסבלנות", "אפנה אותו למנהל", "אגיד שזה המחיר", "אתעלם"] },
            { id: 5, q: "המנהל נתן לך משימה שאתה פחות אוהב?", a: ["אבצע הכי טוב ומהר", "אבצע ואז אבקש לגוון", "אעשה לאט", "אחפש מישהו שיחליף"] },
            { id: 10, q: "איזו צורת עבודה אתה מעדיף?", a: ["אחריות עצמאית", "עבודת צוות", "שיגידו לי מה לעשות", "שקט במחסן"] },
            { id: 15, q: "מה הדבר שהכי חשוב לך בעבודה?", a: ["שירות מעולה", "קידום לניהול", "סדר וארגון", "המשכורת והשקט"] }
            // צמצמתי פה לצורך הקוד, במציאות יש 15 שאלות
        ];

        const App = () => {
            const [view, setView] = useState('quiz');
            const [candidates, setCandidates] = useState([]);
            const [form, setForm] = useState({ fn: '', ln: '', bday: '' });
            const [startTime, setStartTime] = useState(Date.now());
            const [answers, setAnswers] = useState({});

            const handleSend = () => {
                const duration = Math.floor((Date.now() - startTime) / 1000);
                
                // ניתוח נומרולוגי-אישיותי
                const dateDigits = form.bday.replace(/\D/g,'').split('').map(Number);
                const sum = dateDigits.reduce((a,b)=>a+b, 0) % 9 || 9;
                
                // ניתוח אינטראקציה
                let teamFit = answers[10] == 1 ? "שחקן נשמה - ישתלב חברתית בקלות." : "זאב בודד - צריך משימות מוגדרות ופחות תלות בצוות.";
                
                const newCand = {
                    id: Date.now(),
                    ...form,
                    fullName: `${form.fn} ${form.ln}`,
                    duration,
                    analysis: `מועמד עם מספר גורל ${sum}. ${teamFit}`,
                    buddy: '',
                    tasks: { intro: false, tour: false, team: false }
                };
                setCandidates([newCand, ...candidates]);
                setView('done');
            };

            const updateCand = (id, field, value) => {
                setCandidates(candidates.map(c => c.id === id ? {...c, [field]: value} : c));
            };

            if (view === 'admin') return (
                <div className="container" dir="rtl">
                    <header className="header"><h1>ניהול קליטה ואינטראקציה</h1></header>
                    <button onClick={()=>setView('quiz')} style={{marginBottom:20}}>חזרה לשאלון</button>
                    
                    {candidates.map(c => (
                        <div key={c.id} className="admin-card">
                            <h2 style={{margin:0}}>{c.fullName} <span style={{fontSize:'0.8rem', opacity:0.6}}>(נולד: {c.bday})</span></h2>
                            
                            <div className="section-title">📊 אבחון אופי ופוטנציאל</div>
                            <div className="analysis-text">{c.analysis}</div>

                            <div className="interaction-box">
                                <div className="section-title">🤝 אינטראקציה מנהל-מועמד (משימות לראיון)</div>
                                <div className="check-item"><input type="checkbox" /> שיחת הכרה אישית (תחביבים, רקע)</div>
                                <div className="check-item"><input type="checkbox" /> סיבוב היכרות בסניף (מחסן, קופות, עמדות)</div>
                                <div className="check-item"><input type="checkbox" /> תיאום ציפיות (שעות, עומס, משמעת)</div>
                            </div>

                            <div className="buddy-selector">
                                <div className="section-title">👥 אינטראקציה עם הצוות (חיבור חברתי)</div>
                                <label style={{fontSize:'0.8rem'}}>בחר עובד ותיק שילווה את {c.fn}:</label>
                                <select value={c.buddy} onChange={(e)=>updateCand(c.id, 'buddy', e.target.value)}>
                                    <option value="">בחר "חבר מאמץ"...</option>
                                    {STAFF_VETERANS.map(v => <option key={v} value={v}>{v}</option>)}
                                </select>
                                {c.buddy && <div style={{fontSize:'0.85rem', color:var(--pink)}}>📌 משימה ל{c.buddy}: להכיר למועמד את פינת האוכל והצוות בהפסקה.</div>}
                            </div>

                            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginTop:15}}>
                                <select><option>שיבוץ מחלקה...</option>{DEPARTMENTS.map(d=><option key={d}>{d}</option>)}</select>
                                <div className="status-buttons" style={{display:'flex', gap:5}}>
                                    {['ממתין', 'התקבל'].map(s => (
                                        <button key={s} className={`btn-status ${c.status === s ? 'active' : ''}`} onClick={()=>updateCand(c.id, 'status', s)}>{s}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            );

            if (view === 'done') return (
                <div className="container" style={{textAlign:'center', padding:50}}><div className="glass-card"><h1>תודה {form.fn}!</h1><p>הפרטים עברו למנהל. מיד יקראו לך.</p><button className="btn-main" onClick={()=>setView('quiz')}>מועמד חדש</button></div></div>
            );

            return (
                <div className="container" dir="rtl">
                    <div className="glass-card">
                        <header className="header"><h1>MAX STOCK | הצטרפות לצוות</h1></header>
                        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
                            <input placeholder="שם פרטי" onChange={e=>setForm({...form, fn:e.target.value})} />
                            <input placeholder="שם משפחה" onChange={e=>setForm({...form, ln:e.target.value})} />
                        </div>
                        <label style={{fontSize:'0.8rem'}}>תאריך לידה מלא:</label>
                        <input type="date" onChange={e=>setForm({...form, bday:e.target.value})} />

                        {QUESTIONS.map((q, i) => (
                            <div key={i} className="q-card">
                                <p><strong>{q.q}</strong></p>
                                <select onChange={(e)=>setAnswers({...answers, [q.id]: e.target.value})}>
                                    <option value="">בחר תשובה...</option>
                                    {q.a.map((a,idx)=><option key={idx} value={idx}>{a}</option>)}
                                </select>
                            </div>
                        ))}

                        <button className="btn-main" onClick={handleSend}>סיום ושליחה</button>
                        
                        <div style={{marginTop:30, textAlign:'center'}}>
                            <button style={{background:'none', border:'none', color:'#444', cursor:'pointer'}} onClick={()=>{
                                const p = prompt("סיסמה:");
                                if(p && p.toUpperCase() === ADMIN_PASS) setView('admin');
                            }}>ניהול וכניסת צוות 🔒</button>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
