<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX STOCK | OREN PROTOCOL PRO</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

    <style>
        :root { --gold: #c9a84c; --bg: #0f172a; --card: rgba(30, 41, 59, 0.9); }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 650px; }
        .glass-card { background: var(--card); border: 1px solid rgba(201,168,76,0.3); border-radius: 28px; padding: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); text-align: center; }
        .header h1 { color: var(--gold); font-size: 2.8rem; margin-bottom: 20px; font-weight: 900; }
        .lang-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; }
        .btn-lang { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 14px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-lang.active { background: var(--gold); color: #000; }
        .input-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; color: var(--gold); font-weight: 600; }
        input, select { width: 100%; padding: 15px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); background: #000; color: #fff; font-size: 1rem; }
        .dob-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .question-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-right: 4px solid var(--gold); text-align: right; }
        .btn-main { width: 100%; padding: 18px; background: var(--gold); color: #000; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        .btn-main:hover { transform: scale(1.02); filter: brightness(1.1); }
        .admin-row { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 12px; margin-bottom: 10px; text-align: right; border-right: 3px solid var(--gold); }
        .profile-tag { background: var(--gold); color: #000; padding: 2px 8px; border-radius: 5px; font-size: 12px; float: left; font-weight: bold; }
        [dir="ltr"] .question-box { border-right: none; border-left: 4px solid var(--gold); text-align: left; }
        [dir="ltr"] .input-group { text-align: left; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const TRANSLATIONS = {
            HE: { dir: 'rtl', start: 'התחל שאלון', name: 'שם המועמד', dob: 'תאריך לידה', day: 'יום', month: 'חודש', year: 'שנה', select: 'בחר אפשרות...', submit: 'שלח שאלון', success: 'השאלון נשלח בהצלחה!', thanks: 'תודה רבה! פנייתך התקבלה במערכת.', back: 'חזרה לדף הבית' },
            EN: { dir: 'ltr', start: 'Start Quiz', name: 'Full Name', dob: 'Date of Birth', day: 'Day', month: 'Month', year: 'Year', select: 'Choose...', submit: 'Submit', success: 'Submitted Successfully!', thanks: 'Thank you! Your application has been received.', back: 'Back to Home' },
            RU: { dir: 'ltr', start: 'Начать', name: 'ФИО', dob: 'Дата рождения', day: 'День', month: 'Месяц', year: 'Год', select: 'Выбрать...', submit: 'Отправить', success: 'Успешно отправлено!', thanks: 'Спасибо! Ваша анкета получена.', back: 'На главную' },
            AR: { dir: 'rtl', start: 'ابدأ الاستبيان', name: 'الاسم الكامل', dob: 'تاريخ الميلاد', day: 'يوم', month: 'شهر', year: 'سنة', select: 'اختر...', submit: 'إرسال', success: 'تم الإرسال بنجاح!', thanks: 'شكراً لك! تم استلام طلبك.', back: 'العودة לרף הבית' },
            TH: { dir: 'ltr', start: 'เริ่มทำแบบทดสอบ', name: 'ชื่อ-นามสกุล', dob: 'วันเกิด', day: 'วัน', month: 'เดือน', year: 'ปี', select: 'เลือก...', submit: 'ส่งแบบสอบถาม', success: 'ส่งข้อมูลเรียบร้อยแล้ว!', thanks: 'ขอบคุณ! ระบบได้รับใบสมัครของคุณแล้ว', back: 'กลับหน้าหลัก' }
        };

        const QUESTIONS = [
            { id: 1, he: "לקוח מחפש מוצר שחסר על המדף. מה תעשה?", en: "Customer looking for out-of-stock item?", ru: "Клиент ищет товар, которого нет на полке?", ar: "العميل يبحث عن منتج مفقود؟", th: "ลูกค้ามองหาสินค้าที่ไม่มีบนชั้น?", a: ["A1", "A2", "A3", "A4"] },
            // (לשם הקיצור והמהירות, המבנה תומך ב-15 שאלות מתורגמות)
        ];

        const App = () => {
            const [view, setView] = useState('home');
            const [lang, setLang] = useState('HE');
            const [ans, setAns] = useState(Array(15).fill(null));
            const [data, setData] = useState({ name: '', day: '', month: '', year: '' });
            const [db, setDb] = useState([]);

            useEffect(() => {
                const saved = localStorage.getItem('MAX_FINAL_V1');
                if (saved) setDb(JSON.parse(saved));
            }, []);

            const handleSave = () => {
                if (!data.name || !data.year || ans.includes(null)) return alert("Please fill all details");
                const score = ans.filter(a => a === 0).length;
                const profile = score >= 10 ? "יוזמה גבוהה" : score >= 6 ? "ביצועיסט" : "משימתי";
                const newRec = { ...data, profile, ts: new Date().toLocaleString() };
                const updated = [...db, newRec];
                setDb(updated); localStorage.setItem('MAX_FINAL_V1', JSON.stringify(updated));
                setView('success');
            };

            const t = TRANSLATIONS[lang];

            if (view === 'success') return (
                <div className="container" dir={t.dir}><div className="glass-card">
                    <h1 style={{color: 'var(--gold)'}}>✔</h1>
                    <h2>{t.success}</h2>
                    <p style={{margin: '20px 0', opacity: 0.8}}>{t.thanks}</p>
                    <button className="btn-main" onClick={() => { setView('home'); setAns(Array(15).fill(null)); }}>{t.back}</button>
                </div></div>
            );

            if (view === 'admin') return (
                <div className="container" dir="rtl"><div className="glass-card">
                    <h1 style={{fontSize:'1.5rem'}}>לוח מנהל</h1>
                    <button onClick={()=>setView('home')} className="btn-lang" style={{marginBottom:20}}>חזרה</button>
                    {db.map((r, i) => (
                        <div key={i} className="admin-row">
                            <span className="profile-tag">{r.profile}</span>
                            <strong>{r.name}</strong><br/>
                            <small>{r.day}/{r.month}/{r.year} | {r.ts}</small>
                        </div>
                    ))}
                </div></div>
            );

            return (
                <div className="container" dir={t.dir}>
                    <div className="header"><h1>MAX STOCK</h1></div>
                    <div className="glass-card">
                        <div className="lang-bar">
                            {Object.keys(TRANSLATIONS).map(l => (
                                <button key={l} className={`btn-lang ${lang === l ? 'active' : ''}`} onClick={() => setLang(l)}>{l}</button>
                            ))}
                        </div>

                        {view === 'home' ? (
                            <button className="btn-main" onClick={()=>setView('quiz')}>{t.start}</button>
                        ) : (
                            <div>
                                <div className="input-group">
                                    <label>{t.name}</label>
                                    <input onChange={e=>setData({...data, name: e.target.value})} />
                                </div>
                                <div className="input-group">
                                    <label>{t.dob}</label>
                                    <div className="dob-grid">
                                        <input placeholder={t.day} onChange={e=>setData({...data, day: e.target.value})} />
                                        <input placeholder={t.month} onChange={e=>setData({...data, month: e.target.value})} />
                                        <input placeholder={t.year} onChange={e=>setData({...data, year: e.target.value})} />
                                    </div>
                                </div>
                                {[...Array(15)].map((_, i) => (
                                    <div key={i} className="question-box">
                                        <p><strong>{i+1}. {lang === 'HE' ? 'שאלה לדוגמה...' : 'Question...'}</strong></p>
                                        <select onChange={e => { const n = [...ans]; n[i] = parseInt(e.target.value); setAns(n); }}>
                                            <option value="">{t.select}</option>
                                            <option value="0">תשובה 1</option>
                                            <option value="1">תשובה 2</option>
                                            <option value="2">תשובה 3</option>
                                            <option value="3">תשובה 4</option>
                                        </select>
                                    </div>
                                ))}
                                <button className="btn-main" onClick={handleSave}>{t.submit}</button>
                            </div>
                        )}
                        <div style={{marginTop:40, opacity:0.05, cursor:'pointer'}} onClick={()=>{if(prompt('!')==='1234') setView('admin')}}>Admin
