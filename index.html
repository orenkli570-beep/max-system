<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX STOCK | OREN PROTOCOL V2</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

    <style>
        :root { --gold: #c9a84c; --bg: #0f172a; --card: rgba(30, 41, 59, 0.8); }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 650px; }
        .glass-card { background: var(--card); border: 1px solid rgba(201,168,76,0.2); border-radius: 24px; padding: 35px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .header h1 { text-align: center; color: var(--gold); font-size: 2.5rem; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--gold); font-weight: 600; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: #000; color: #fff; }
        .dob-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .question-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-right: 4px solid var(--gold); }
        .btn-main { width: 100%; padding: 18px; background: var(--gold); color: #000; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; font-size: 1.1rem; }
        .admin-item { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(201,168,76,0.1); }
        .tag { background: var(--gold); color: #000; padding: 3px 8px; border-radius: 6px; font-size: 0.8rem; float: left; font-weight: bold; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const DEPARTMENTS = ["כלי בית ומטבח", "טקסטיל ונוי", "צעצועים ופנאי", "חומרי ניקוי ופארם", "יצירה וציוד משרדי", "חשמל ואלקטרוניקה", "ריהוט וגן", "קמפינג וטיולים", "עולם הילד והתינוק", "כלי עבודה ותחזוקה", "אחסון וארגון הבית", "מוצרי מסיבות ואירועים", "עונתי"];
        const POSITIONS = ["מנהל סניף", "סגן מנהל", "אחראי משמרת", "מנהל מחלקה", "קופאי/ת", "סדרן/ית", "מחסנאי/ת", "מלגזן/ית", "שירות לקוחות", "כללי"];

        const QUESTIONS = [
            {q: "לקוח מחפש מוצר שחסר על המדף. מה תעשה?", a: ["אבדוק במחסן ואביא לו אישית", "אבדוק במחשב אם קיים במלאי", "אגיד שחסר ואכוון למוצר דומה", "אמשיך בעבודתי"]},
            {q: "יש תור ארוך מאוד בקופות ואתה בסידור מדף?", a: ["אגש מיד לעזור בקופה", "אחכה שיקראו לי", "אמשיך לסדר", "אלך למחסן"]},
            {q: "ראית מוצר שבור או נוזל על הרצפה?", a: ["אנקה מיד", "אדווח למנהל", "אקרא לניקיון", "אעקוף את המקום"]},
            {q: "לקוח מתלונן על מחיר גבוה?", a: ["אקשיב ואסביר בנועם", "אפנה למנהל", "אגיד שזה המחיר", "אתעלם"]},
            {q: "קיבלת משימה שאתה פחות אוהב?", a: ["אבצע הכי טוב ומהר", "אבצע ואבקש לגוון", "אעשה לאט", "אחפש מי שיחליף אותי"]},
            {q: "חבר לעבודה טעה בסידור?", a: ["אעזור לו לתקן", "אסב את תשומת ליבו", "אדווח למנהל", "לא ענייני"]},
            {q: "המחלקה הפוכה לגמרי כשהגעת?", a: ["אתחיל לסדר מיד", "אשאל מאיפה להתחיל", "אסדר רק את האזור שלי", "אחכה להנחיות"]},
            {q: "לקוח מתלבט לגבי קניית מתנה?", a: ["אציע אפשרויות ואעזור", "אכוון לאזור הכללי", "אגיד שזה עניין של טעם", "אפנה לעובד אחר"]},
            {q: "מצאת שטר כסף על הרצפה בחנות?", a: ["אמסור למנהל/קופה", "אשאל לקוחות", "קופת צדקה", "אשמור בכיס"]},
            {q: "צורת עבודה מועדפת?", a: ["אחריות אישית וריצה לבד", "עבודה בצוות", "הנחיות מדויקות", "עבודה שקטה במחסן"]},
            {q: "לקוח דורש הנחה שאי אפשר לתת?", a: ["אסביר בנימוס את המדיניות", "אבדוק מבצע חלופי", "אפנה למנהל", "אגיד אין הנחות"]},
            {q: "סימנת מחיר טעות על קבוצת מוצרים?", a: ["אתקן מיד ואדווח", "אשאל מה לעשות", "אקווה שלא ישימו לב", "אשאיר ככה"]},
            {q: "המשמרת נגמרה והחנות עמוסה?", a: ["אשאר עוד כמה דקות לעזור", "אסיים משימה ואלך", "אצא מיד", "אלך בלי להגיד"]},
            {q: "עובד אחר מבקש לעשות משהו לא תקין?", a: ["אסרב ואסביר לו", "אדווח למנהל", "אזרום פעם אחת", "אעשה מה שביקש"]},
            {q: "מה הכי חשוב לך בעבודה?", a: ["להתקדם לניהול", "שירות מעולה", "סדר וארגון", "המשכורת והשקט"]}
        ];

        const App = () => {
            const [view, setView] = useState('home');
            const [ans, setAns] = useState(Array(15).fill(null));
            const [data, setData] = useState({ name: '', day: '', month: '', year: '', dept: '', pos: '' });
            const [db, setDb] = useState([]);

            useEffect(() => {
                const saved = localStorage.getItem('MAX_V2_DB');
                if (saved) setDb(JSON.parse(saved));
            }, []);

            const save = () => {
                if (!data.name || !data.year || ans.includes(null)) return alert("נא למלא את כל הפרטים");
                const score = ans.filter(a => a === 0).length;
                const profile = score >= 10 ? "יוזמה גבוהה" : score >= 6 ? "ביצועיסט" : "משימתי";
                const newRec = { ...data, profile, ts: new Date().toLocaleString() };
                const updated = [...db, newRec];
                setDb(updated); localStorage.setItem('MAX_V2_DB', JSON.stringify(updated));
                alert("השאלון נשלח!"); setView('home');
            };

            if (view === 'admin') return (
                <div className="container"><div className="glass-card">
                    <h2 style={{color:'var(--gold)'}}>לוח בקרה - מנהל</h2>
                    <button onClick={()=>setView('home')} className="btn-main" style={{padding:10, marginBottom:20}}>חזרה</button>
                    {db.map((r, i) => (
                        <div key={i} className="admin-item">
                            <span className="tag">{r.profile}</span>
                            <strong>{r.name}</strong><br/>
                            <small>{r.day}/{r.month}/{r.year} | {r.ts}</small>
                        </div>
                    ))}
                </div></div>
            );

            return (
                <div className="container">
                    <div className="header"><h1>MAX STOCK</h1></div>
                    <div className="glass-card">
                        {view === 'home' ? (
                            <div style={{textAlign:'center'}}>
                                <button className="btn-main" onClick={()=>setView('quiz')}>התחל שאלון מועמד</button>
                                <div style={{marginTop:50, opacity:0.1, cursor:'pointer'}} onClick={()=>{if(prompt('Password?')==='1234') setView('admin')}}>Admin</div>
                            </div>
                        ) : (
                            <div>
                                <div className="input-group">
                                    <label>שם המועמד</label>
                                    <input onChange={e=>setData({...data, name: e.target.value})} />
                                </div>
                                <div className="input-group">
                                    <label>תאריך לידה (יום / חודש / שנה)</label>
                                    <div className="dob-grid">
                                        <input placeholder="יום" onChange={e=>setData({...data, day: e.target.value})} />
                                        <input placeholder="חודש" onChange={e=>setData({...data, month: e.target.value})} />
                                        <input placeholder="שנה" onChange={e=>setData({...data, year: e.target.value})} />
                                    </div>
                                </div>
                                <hr style={{opacity:0.1, margin:'25px 0'}} />
                                {QUESTIONS.map((q, i) => (
                                    <div key={i} className="question-box">
                                        <p><strong>{i+1}. {q.q}</strong></p>
                                        <select onChange={e=>{const n=[...ans]; n[i]=parseInt(e.target.value); setAns(n)}}>
                                            <option value="">בחר תשובה...</option>
                                            {q.a.map((at, ai) => <option key={ai} value={ai}>{at}</option>)}
                                        </select>
                                    </div>
                                ))}
                                <button className="btn-main" onClick={save}>שלח מועמדות</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
