<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAX STOCK | HR Smart System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <style>
        :root { --gold: #c9a84c; --bg: #0b0f1a; --card: #161e2d; --text: #f8fafc; --accent: #38bdf8; --success: #22c55e; --danger: #ef4444; }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 700px; margin: 0 auto; }
        .glass-card { background: var(--card); border: 1px solid var(--gold); border-radius: 20px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        
        .lang-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .lang-btn { background: #000; border: 1px solid var(--gold); color: #fff; padding: 10px 15px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .lang-btn.active { background: var(--gold); color: #000; font-weight: bold; }
        
        .header { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 25px; padding-bottom: 10px; }
        .header img { max-width: 150px; margin-bottom: 10px; }

        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; background: #000; color: #fff; margin-bottom: 15px; font-size: 1rem; }
        .q-card { background: rgba(255,255,255,0.03); padding: 18px; border-radius: 15px; margin-bottom: 15px; border-right: 4px solid var(--gold); }
        .q-card p { margin-top: 0; font-weight: 600; }

        .btn-main { width: 100%; padding: 20px; background: var(--gold); color: #000; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        .btn-main:hover { opacity: 0.9; transform: translateY(-2px); }

        /* Admin Styles */
        .admin-card { background: #1e293b; border-radius: 18px; padding: 20px; margin-bottom: 20px; border: 1px solid #444; }
        .analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .analysis-item { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; border-top: 2px solid var(--accent); font-size: 0.85rem; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; margin-left: 5px; text-transform: uppercase; }
        .badge-warning { background: var(--danger); color: white; }
        .badge-info { background: var(--accent); color: #000; }
        
        .footer-link { text-align: center; margin-top: 30px; opacity: 0.4; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const ADMIN_PASS = "MAX2026";

        const TRANSLATIONS = {
            HE: {
                title: "שאלון מועמד - MAX", fname: "שם פרטי", lname: "שם משפחה", bday: "תאריך לידה", send: "סיום ושליחה", select: "בחר תשובה...",
                questions: [
                    { q: "1. לקוח מחפש מוצר שחסר על המדף?", a: ["אבדוק במחסן", "אבדוק במחשב", "אכוון לדומה", "אמשיך בעבודתי"] },
                    { q: "2. תור ארוך מאוד בקופות ואתה בסידור מדף?", a: ["אגש מיד לעזור", "אחכה שיקראו לי", "אסיים קודם את המדף", "אלך למחסן"] },
                    { q: "3. ראית מוצר שבור או נוזל על הרצפה?", a: ["אנקה מיד", "אדווח למנהל", "אקרא לעובד ניקיון", "אעקוף את המפגע"] },
                    { q: "4. לקוח מתלונן בקול רם על מחיר גבוה?", a: ["אקשיב בסבלנות", "אפנה אותו למנהל", "אגיד שזה המחיר", "אתעלם"] },
                    { q: "5. המנהל נתן לך משימה שאתה פחות אוהב?", a: ["אבצע הכי טוב ומהר", "אבצע ואז אבקש לגוון", "אעשה לאט", "אחפש מישהו שיחליף"] },
                    { q: "6. חבר לעבודה טעה בסידור המחלקה?", a: ["אעזור לו לתקן", "אסב את תשומת ליבו", "אדווח למנהל", "לא ענייני"] },
                    { q: "7. הגעת למשמרת והמחלקה הפוכה לגמרי?", a: ["אתחיל לסדר מיד", "אשאל מאיפה להתחיל", "אסדר רק את האזור שלי", "אחכה להנחיות"] },
                    { q: "8. לקוח מתלבט זמן רב לגבי מוצר?", a: ["אציע עזרה והמלצה", "אכוון לאזור הכללי", "אגיד שזה עניין של טעם", "אפנה לעובד אחר"] },
                    { q: "9. מצאת שטר כסף על הרצפה בחנות?", a: ["אמסור למנהל/קופה", "אשאל לקוחות אם איבדו", "אשים בצדקה", "אשמור בכיס"] },
                    { q: "10. איזו צורת עבודה אתה מעדיף?", a: ["אחריות עצמאית", "עבודת צוות", "שיגידו לי מה לעשות", "שקט במחסן"] },
                    { q: "11. לקוח דורש הנחה שאי אפשר לתת?", a: ["אסביר בנימוס את המדיניות", "אבדוק מבצע חלופי", "אשלח למנהל", "אגיד שאין הנחות"] },
                    { q: "12. סימנת מחיר טעות על קבוצת מוצרים?", a: ["אתקן מיד ואדווח", "אשאל מה לעשות", "אקווה שלא ישימו לב", "אשאיר ככה"] },
                    { q: "13. המשמרת נגמרה והחנות עמוסה מאוד?", a: ["אשאר עוד כמה דקות", "אסיים משימה ואלך", "אצא מיד", "אלך בלי להגיד"] },
                    { q: "14. עובד אחר מבקש לעשות משהו לא תקין?", a: ["אסרב ואסביר", "אדווח למנהל", "אזרום איתו פעם אחת", "אעשה מה שביקש"] },
                    { q: "15. מה הדבר שהכי חשוב לך בעבודה?", a: ["שירות מעולה", "קידום לניהול", "סדר וארגון", "המשכורת והשקט"] }
                ]
            },
            EN: {
                title: "MAX Candidate Form", fname: "First Name", lname: "Last Name", bday: "Date of Birth", send: "Submit Form", select: "Select...",
                questions: [
                    { q: "1. Customer looking for item missing from shelf?", a: ["Check warehouse", "Check computer", "Suggest alternative", "Keep working"] },
                    { q: "2. Long lines at checkout while restocking?", a: ["Help immediately", "Wait to be called", "Finish shelf first", "Go to warehouse"] },
                    { q: "3. Found broken or leaking product?", a: ["Clean immediately", "Report to manager", "Call cleaner", "Bypass"] },
                    { q: "4. Customer shouting about high prices?", a: ["Listen patiently", "Refer to manager", "State fixed price", "Ignore"] },
                    { q: "5. Manager gives task you don't like?", a: ["Do it best/fastest", "Do it then ask change", "Work slowly", "Ask for swap"] },
                    { q: "6. Co-worker made mistake in department?", a: ["Help them fix", "Alert them privately", "Report to manager", "Not my business"] },
                    { q: "7. Arrived to a messy department?", a: ["Start tidying", "Ask where to start", "Tidy my area only", "Wait for orders"] },
                    { q: "8. Customer hesitating for long time?", a: ["Offer help", "Point to area", "Say it's taste-based", "Refer to colleague"] },
                    { q: "9. Found cash on store floor?", a: ["Give to manager", "Ask customers", "Donate it", "Keep it"] },
                    { q: "10. Preferred work style?", a: ["Independent", "Teamwork", "Directed", "Quiet/Back office"] },
                    { q: "11. Customer demands impossible discount?", a: ["Explain policy", "Check alternative", "Send to manager", "Say no"] },
                    { q: "12. You marked wrong prices on items?", a: ["Fix & report", "Ask what to do", "Hope no one sees", "Leave it"] },
                    { q: "13. Shift over but store is packed?", a: ["Stay few mins", "Finish task then go", "Leave immediately", "Slip away"] },
                    { q: "14. Co-worker asks you to break rules?", a: ["Refuse & explain", "Report to manager", "Follow once", "Do as asked"] },
                    { q: "15. What's most important to you?", a: ["Great service", "Promotion", "Order/Organization", "Salary/Peace"] }
                ]
            },
            // ניתן להוסיף כאן RU, AR, TH באותה צורה.
        };

        const App = () => {
            const [lang, setLang] = useState('HE');
            const [view, setView] = useState('quiz');
            const [candidates, setCandidates] = useState([]);
            const [form, setForm] = useState({ fn: '', ln: '', bday: '' });
            const [answers, setAnswers] = useState({});
            const [startTime, setStartTime] = useState(Date.now());

            const runAnalysis = (ans, bday, duration) => {
                let report = { social: "ניטרלי", manager: "ביצועיסט", num: "בבדיקה", warning: false };
                
                // ניתוח אינטראקציה עובדים (שאלה 6 ו-10)
                if (ans[5] == 0 && ans[9] == 1) report.social = "דבק חברתי - עוזר ומפרגן";
                else if (ans[9] == 0) report.social = "עובד עצמאי - מתאים למשימות לבד";
                else report.social = "ממוקד משימה - פחות מעורב חברתית";

                // ניתוח מול מנהל (שאלה 5)
                if (ans[4] == 0) report.manager = "ראש גדול - מבצע בשמחה";
                else if (ans[4] == 1) report.manager = "תקשורתי - מבצע ומציף קשיים";
                else report.manager = "ראש קטן - זקוק לפיקוח";

                // נומרולוגיה
                if (bday) {
                    const n = bday.replace(/\D/g,'').split('').reduce((a,b)=>a+parseInt(b),0) % 9 || 9;
                    const map = {1:"מנהיג", 2:"רגיש", 3:"יצירתי", 4:"יסודי", 5:"זריז", 6:"אחראי", 7:"רוחני", 8:"חומרני", 9:"רחב אופקים"};
                    report.num = map[n];
                }
                
                if (duration < 120) report.warning = true;
                return report;
            };

            const handleSend = () => {
                if (!form.fn || !form.ln) return alert("אנא מלא שם מלא");
                const duration = Math.floor((Date.now() - startTime) / 1000);
                const analysis = runAnalysis(answers, form.bday, duration);
                
                const cand = { id: Date.now(), ...form, answers, analysis, duration, lang, status: 'חדש' };
                setCandidates([cand, ...candidates]);
                setView('done');
            };

            const isRTL = lang === 'HE' || lang === 'AR';

            if (view === 'admin') return (
                <div className="container" dir="rtl">
                    <header className="header"><h1>ניהול מועמדים - MAX</h1></header>
                    <button className="lang-btn" style={{marginBottom:20}} onClick={()=>setView('quiz')}>חזרה לשאלון</button>
                    {candidates.length === 0 && <p>אין מועמדים רשומים כרגע.</p>}
                    {candidates.map(c => (
                        <div key={c.id} className="admin-card">
                            <div style={{display:'flex', justifyContent:'space-between', borderBottom:'1px solid #444', paddingBottom:10}}>
                                <strong>{c.fn} {c.ln} ({c.lang})</strong>
                                <span style={{fontSize:'0.8rem'}}>זמן: {Math.floor(c.duration/60)}:{(c.duration%60).toString().padStart(2,'0')}</span>
                            </div>
                            {c.analysis.warning && <div className="badge badge-warning">מילוי מהיר מדי - חשד לחוסר רצינות</div>}
                            <div className="analysis-grid">
                                <div className="analysis-item"><strong>חברה:</strong><br/>{c.analysis.social}</div>
                                <div className="analysis-item"><strong>מנהל:</strong><br/>{c.analysis.manager}</div>
                                <div className="analysis-item"><strong>נומרולוגיה:</strong><br/>{c.analysis.num}</div>
                                <div className="analysis-item"><strong>גיל:</strong><br/>{c.bday || 'לא הוזן'}</div>
                            </div>
                            <div style={{marginTop:15, color:'var(--gold)', fontSize:'0.85rem'}}>
                                <strong>טיפ:</strong> {c.analysis.social.includes('עצמאי') ? 'שבץ אותו במחסן/סידור.' : 'מתאים לקופות/שירות.'}
                            </div>
                        </div>
                    ))}
                </div>
            );

            if (view === 'done') return (
                <div className="container" style={{textAlign:'center', paddingTop:100}}>
                    <div className="glass-card">
                        <div style={{fontSize:'4rem', color:var(--success)}}>✓</div>
                        <h2>השאלון נשלח בהצלחה!</h2>
                        <p>תודה רבה, ניתן להעזיר את המכשיר למנהל.</p>
                        <button className="btn-main" onClick={()=>{ setForm({fn:'', ln:'', bday:''}); setAnswers({}); setStartTime(Date.now()); setView('quiz'); }}>מועמד חדש</button>
                    </div>
                </div>
            );

            return (
                <div className="container" dir={isRTL ? 'rtl' : 'ltr'}>
                    <div className="glass-card">
                        <div className="lang-bar">
                            {Object.keys(TRANSLATIONS).map(l => (
                                <button key={l} className={`lang-btn ${lang === l ? 'active' : ''}`} onClick={()=>setLang(l)}>{l}</button>
                            ))}
                            <button className="lang-btn" style={{borderStyle:'dashed'}}>RU</button>
                            <button className="lang-btn" style={{borderStyle:'dashed'}}>AR</button>
                            <button className="lang-btn" style={{borderStyle:'dashed'}}>TH</button>
                        </div>
                        <header className="header">
                            <h1>{TRANSLATIONS[lang]?.title || "MAX"}</h1>
                        </header>
                        
                        <input placeholder={TRANSLATIONS[lang]?.fname} value={form.fn} onChange={e=>setForm({...form, fn:e.target.value})} />
                        <input placeholder={TRANSLATIONS[lang]?.lname} value={form.ln} onChange={e=>setForm({...form, ln:e.target.value})} />
                        <label style={{fontSize:'0.8rem', display:'block', marginBottom:5}}>{TRANSLATIONS[lang]?.bday}:</label>
                        <input type="date" value={form.bday} onChange={e=>setForm({...form, bday:e.target.value})} />

                        {(TRANSLATIONS[lang]?.questions || TRANSLATIONS.HE.questions).map((q, i) => (
                            <div key={i} className="q-card">
                                <p>{q.q}</p>
                                <select onChange={e=>setAnswers({...answers, [i]:e.target.value})}>
                                    <option value="">{TRANSLATIONS[lang]?.select || "בחר..."}</option>
                                    {q.a.map((ans, idx) => <option key={idx} value={idx}>{ans}</option>)}
                                </select>
                            </div>
                        ))}

                        <button className="btn-main" onClick={handleSend}>{TRANSLATIONS[lang]?.send || "שלח"}</button>
                        
                        <div className="footer-link">
                            <span onClick={()=>{ if(prompt("Pass:")===ADMIN_PASS) setView('admin'); }}>Admin Login</span>
                        </div>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
