<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MAX STOCK - OREN PROTOCOL V5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <style>
        :root { --gold: #c9a84c; --dark: #0f1a2e; --card: #16213e; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--dark); color: #fff; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid rgba(201,168,76,0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: var(--gold); font-size: 2.2rem; margin-bottom: 20px; font-weight: 900; }
        .lang-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-lang { padding: 8px 15px; border-radius: 8px; border: 1px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-lang.active { background: var(--gold); color: #000; }
        .form-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 5px; color: var(--gold); font-weight: bold; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; color: #000; background: #fff; }
        .q-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 15px; border-right: 4px solid var(--gold); text-align: right; }
        .btn-main { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--gold), #a38637); border: none; border-radius: 12px; color: #fff; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .admin-item { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 3px solid var(--gold); text-align: right; }
        .badge { background: var(--gold); color: #000; padding: 2px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; float: left; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const TRANSLATIONS = {
            he: {
                dir: "rtl", start: "התחל שאלון", send: "שלח שאלון", name: "שם מלא", dob: "תאריך לידה (DD.MM)", 
                dept: "מחלקה מועדפת", pos: "תפקיד מבוקש", select: "בחר...",
                depts: ["כלי בית ומטבח", "טקסטיל ונוי", "צעצועים ופנאי", "חומרי ניקוי ופארם", "יצירה וציוד משרדי", "חשמל ואלקטרוניקה", "ריהוט וגן", "קמפינג וטיולים", "עולם הילד והתינוק", "כלי עבודה ותחזוקה", "אחסון וארגון הבית", "מוצרי מסיבות ואירועים", "עונתי"],
                positions: ["מנהל סניף", "סגן מנהל", "אחראי משמרת", "מנהל מחלקה", "קופאי/ת ראשי/ת", "קופאי/ת", "סדרן/ית סחורה", "מחסנאי/ת", "מלגזן/ית", "איש אחזקה", "נציג שירות", "אחראי ליקוט", "מניעת אובדן מלאי", "עובד כללי", "מזכיר/ת סניף"],
                questions: [
                    {q: "לקוח מחפש מוצר שחסר על המדף. מה תעשה?", a: ["אבדוק במחסן ואביא לו אישית", "אבדוק במחשב אם קיים במלאי", "אגיד שחסר ואכוון למוצר דומה", "אמשיך בעבודתי הרגילה"]},
                    {q: "יש תור ארוך מאוד בקופות ואתה בסידור מדף?", a: ["אגש מיד לעזור בקופה בלי שיקראו לי", "אחכה שיקראו לי לעזור", "אמשיך לסדר עד שאסיים", "אלך למחסן כדי לא להפריע"]},
                    {q: "ראית מוצר שבור או נוזל על הרצפה במעבר?", a: ["אנקה מיד ואדאג לבטיחות", "אדווח למנהל המשמרת", "אקרא לעובד ניקיון", "אעקוף את המפגע"]},
                    {q: "לקוח מתלונן בקול רם על מחיר גבוה?", a: ["אקשיב בסבלנות ואסביר בנועם", "אפנה אותו למנהל הסניף", "אגיד שזה המחיר ואין מה לעשות", "אתעלם ואעבור מחלקה"]},
                    {q: "המנהל נתן לך משימה שאתה פחות אוהב?", a: ["אבצע אותה הכי טוב ומהר", "אבצע ואז אבקש לגוון", "אעשה לאט כדי שלא יבקשו שוב", "אנסה למצוא עובד שיחליף אותי"]},
                    {q: "חבר לעבודה טעה בסידור המחלקה?", a: ["אעזור לו לתקן בנעימות", "אסב את תשומת ליבו לטעות", "אדווח למנהל על הטעות", "לא ענייני, כל אחד אחראי על שלו"]},
                    {q: "הגעת למשמרת והמחלקה הפוכה לגמרי?", a: ["אתחיל לסדר מיד לפי דחיפות", "אשאל את המנהל מאיפה להתחיל", "אסדר רק את האזור שלי", "אחכה שמישהו יגיד לי מה לעשות"]},
                    {q: "לקוח מתלבט זמן רב לגבי קניית מתנה?", a: ["אציע לו אפשרויות ואעזור לו", "אכוון אותו לאזור הכללי", "אגיד שזה עניין של טעם", "אפנה אותו לעובד אחר"]},
                    {q: "מצאת שטר כסף על הרצפה בתוך החנות?", a: ["אמסור מיד למנהל או לקופה", "אשאל לקוחות אם מישהו איבד", "אשים אותו בקופת צדקה", "אשמור אותו בכיס"]},
                    {q: "איזו צורת עבודה אתה הכי מעדיף?", a: ["עבודה עם אחריות שבה אני רץ לבד", "עבודה בצוות עם שיתוף פעולה", "עבודה שאומרים לי בדיוק מה לעשות", "עבודה שקטה במחסן"]},
                    {q: "לקוח דורש הנחה שאי אפשר לתת?", a: ["אסביר בנימוס את מדיניות הרשת", "אבדוק אם יש מבצע חלופי", "אשלח אותו להתווכח עם המנהל", "אגיד פשוט 'אין הנחות'"]},
                    {q: "סימנת מחיר טעות על קבוצת מוצרים?", a: ["אתקן מיד ואדווח למנהל", "אשאל את המנהל מה לעשות", "אקווה שאף אחד לא ישים לב", "אשאיר את זה ככה"]},
                    {q: "המשמרת נגמרה והחנות עמוסה מאוד?", a: ["אשאר עוד כמה דקות לעזור", "אסיים את המשימה ואלך", "אצא מיד - השעה הגיעה", "אלך בלי להגיד כלום"]},
                    {q: "עובד אחר מבקש ממך לעשות משהו לא תקין?", a: ["אסרב בנימוס ואסביר לו", "אדווח על כך למנהל", "אזרום איתו פעם אחת", "אעשה מה שביקש"]},
                    {q: "מה הדבר שהכי חשוב לך בעבודה?", a: ["להתקדם לתפקידי ניהול", "שירות מעולה ללקוח", "סדר וארגון במשימות", "המשכורת והשקט שלי"]}
                ]
            }
            // הערה: לצורך הקיצור בקוד, השפות האחרות (EN, RU, AR, TH) ייוצרו אוטומטית מהעברית במערכת הזו
        };

        // פונקציית עזר להשלמת שפות (במציאות יש לתרגם כל שורה, כאן זה שלד)
        ['en', 'ru', 'ar', 'th'].forEach(l => {
            TRANSLATIONS[l] = { ...TRANSLATIONS.he, dir: l === 'ar' ? 'rtl' : 'ltr' };
        });

        const App = () => {
            const [lang, setLang] = useState('he');
            const [view, setView] = useState('home');
            const [formData, setFormData] = useState({ name: '', dob: '', dept: '', pos: '' });
            const [answers, setAnswers] = useState(Array(15).fill(null));

            const t = TRANSLATIONS[lang];

            const save = () => {
                if (!formData.name || !formData.dob || answers.includes(null)) return alert("נא למלא הכל");
                const score = answers.filter(a => a === 0).length;
                const profile = score >= 10 ? "יוזמה גבוהה" : score >= 6 ? "ביצועיסט" : "מבצע משימות";
                const db = JSON.parse(localStorage.getItem('max_db_v5') || '[]');
                db.push({ ...formData, profile, ts: new Date().toLocaleString() });
                localStorage.setItem('max_db_v5', JSON.stringify(db));
                alert("נשלח בהצלחה!"); setView('home');
            };

            if (view === 'admin') {
                const data = JSON.parse(localStorage.getItem('max_db_v5') || '[]');
                return (
                    <div className="container" dir="rtl"><div className="card">
                        <h1>ניהול מועמדים</h1>
                        <button onClick={() => setView('home')} className="btn-lang">חזרה</button>
                        {data.map((item, i) => (
                            <div key={i} className="admin-item">
                                <span className="badge">{item.profile}</span>
                                <strong>{item.name}</strong><br/>
                                {item.pos} | {item.dept}<br/>
                                <small>{item.ts}</small>
                            </div>
                        ))}
                    </div></div>
                );
            }

            if (view === 'quiz') {
                return (
                    <div className="container" dir={t.dir}><div className="card">
                        <h1>{t.start}</h1>
                        <input className="form-group" placeholder={t.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                        <input className="form-group" placeholder={t.dob} onChange={e => setFormData({...formData, dob: e.target.value})} />
                        <select className="form-group" onChange={e => setFormData({...formData, dept: e.target.value})}>
                            <option value="">{t.dept}</option>
                            {t.depts.map(d => <option key={d} value={d}>{d}</option>)}
                        </select>
                        <select className="form-group" onChange={e => setFormData({...formData, pos: e.target.value})}>
                            <option value="">{t.pos}</option>
                            {t.positions.map(p => <option key={p} value={p}>{p}</option>)}
                        </select>
                        {t.questions.map((q, i) => (
                            <div key={i} className="q-card">
                                <p><strong>{i+1}. {q.q}</strong></p>
                                <select style={{marginTop:'10px'}} onChange={e => {
                                    const n = [...answers]; n[i] = parseInt(e.target.value); setAnswers(n);
                                }}>
                                    <option value="">{t.select}</option>
                                    {q.a.map((txt, idx) => <option key={idx} value={idx}>{txt}</option>)}
                                </select>
                            </div>
                        ))}
                        <button className="btn-main" onClick={save}>{t.send}</button>
                    </div></div>
                );
            }

            return (
                <div className="container"><div className="card" style={{textAlign:'center'}}>
                    <h1>MAX STOCK</h1>
                    <div className="lang-bar">
                        {Object.keys(TRANSLATIONS).map(l => (
                            <button key={l} className={`btn-lang ${lang === l ? 'active' : ''}`} onClick={() => setLang(l)}>{l.toUpperCase()}</button>
                        ))}
                    </div>
                    <button className="btn-main" onClick={() => setView('quiz')}>{t.start}</button>
                    <div style={{marginTop:'40px', opacity:0.1}} onClick={() => { if(prompt('סיסמה') === '1234') setView('admin'); }}>Admin</div>
                </div></div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
