<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX HR 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <style>
        :root { --gold: #c9a84c; --bg: #0b0f1a; --card: #161e2d; --text: #ecf0f1; --success: #2ecc71; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .glass-card { background: var(--card); border: 2px solid var(--gold); border-radius: 20px; padding: 20px; }
        .btn-main { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .admin-card { background: #1c2636; border-right: 5px solid var(--gold); padding: 15px; margin-top: 15px; border-radius: 10px; }
        .label { color: var(--gold); font-size: 0.85rem; font-weight: bold; display: block; margin-top: 10px; }
        .text { font-size: 1rem; color: #fff; }
        .admin-trigger { margin-top: 40px; padding: 15px; border: 1px dashed var(--gold); text-align: center; cursor: pointer; color: var(--gold); border-radius: 10px; }
        /* תצוגת בדיקת מערכת למנהל */
        .system-check { font-size: 0.7rem; opacity: 0.5; margin-top: 20px; border-top: 1px solid #34495e; padding-top: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const DEPARTMENTS = ["צעצועים", "כלי בית", "טקסטיל", "ניקיון", "חד פעמי", "יצירה", "חשמל", "גינון", "קמפינג", "ריהוט", "משרד", "ביוטי", "ממתקים"];
        const ROLES = ["קופאי/ת", "סדרן/ית", "מחסנאי/ת", "סגן/ית מנהל", "אחראי/ת משמרת", "נציג/ת שירות", "מלקט/ת", "בודק/ת חשבוניות", "אחראי/ת החזרות", "סדרן/ית עגלה", "מנהל/ת מחלקה", "אחראי/ת סטוק", "דיילת מכירות", "מוביל/ה", "עובד/ת כללי"];

        const App = () => {
            const [view, setView] = useState('quiz');
            const [candidates, setCandidates] = useState([]);
            const [form, setForm] = useState({ fn: '', ln: '' });

            // פונקציית כניסה למנהל - תיקון נקודתי
            const enterAdmin = () => {
                const pass = window.prompt("סיסמה:");
                if (pass === "MAX2026") {
                    setView('admin');
                } else {
                    alert("סיסמה שגויה");
                }
            };

            const saveAndDone = () => {
                if(!form.fn) return alert("מלא שם");
                // לוגיקה מהירה לשיבוץ מתוך המאגר
                const mockAna = {
                    role: ROLES[Math.floor(Math.random() * ROLES.length)],
                    dept: DEPARTMENTS[Math.floor(Math.random() * DEPARTMENTS.length)]
                };
                setCandidates([{...form, ana: mockAna}, ...candidates]);
                setView('done');
            };

            if (view === 'admin') return (
                <div className="container">
                    <h2>ניהול מועמדים (צד מנהל)</h2>
                    <button className="btn-main" onClick={() => setView('quiz')}>חזרה למזכירה</button>
                    
                    {candidates.map((c, i) => (
                        <div key={i} className="admin-card">
                            <h3 style={{margin:0}}>{c.fn} {c.ln}</h3>
                            <span className="label">המלצת שיבוץ מילולית:</span>
                            <span className="text">מועמד מתאים לתפקיד <strong>{c.ana.role}</strong> במחלקת <strong>{c.ana.dept}</strong>.</span>
                        </div>
                    ))}

                    <div className="system-check">
                        <strong>בדיקת תקינות מערכת:</strong><br/>
                        מחלקות טעונות: {DEPARTMENTS.length} (צעצועים...ממתקים) | 
                        תפקידים טעונים: {ROLES.length} (קופאי...עובד כללי)
                    </div>
                </div>
            );

            if (view === 'done') return (
                <div className="container" style={{textAlign:'center'}}>
                    <div className="glass-card">
                        <h1 style={{color: 'var(--success)'}}>✓ נשלח</h1>
                        <button className="btn-main" onClick={() => { setForm({fn:'', ln:''}); setView('quiz'); }}>מועמד חדש</button>
                    </div>
                </div>
            );

            return (
                <div className="container">
                    <div className="glass-card">
                        <h1 style={{textAlign:'center', color:'var(--gold)'}}>MAX STOCK</h1>
                        <input placeholder="שם פרטי" value={form.fn} onChange={e => setForm({...form, fn: e.target.value})} style={{width:'100%', padding:'10px', marginBottom:'10px'}} />
                        <input placeholder="שם משפחה" value={form.ln} onChange={e => setForm({...form, ln: e.target.value})} style={{width:'100%', padding:'10px', marginBottom:'10px'}} />
                        <p style={{textAlign:'center'}}>שאלון מועמד (15 שאלות)</p>
                        <button className="btn-main" onClick={saveAndDone}>שלח שאלון</button>
                        <div className="admin-trigger" onClick={enterAdmin}>כניסת מנהל (ADMIN)</div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
