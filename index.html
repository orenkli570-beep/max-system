<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX STOCK | OREN PROTOCOL PRO</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

    <style>
        :root {
            --gold: #c9a84c;
            --gold-dark: #a38637;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container { width: 100%; max-width: 700px; }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { 
            font-size: 3rem; 
            margin: 0;
            background: linear-gradient(to bottom, #fff, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .lang-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .btn-lang {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-lang.active { background: var(--gold); color: #000; }

        .input-box { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; color: var(--gold); font-size: 0.9rem; font-weight: 600; }
        input, select {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(15, 23, 42, 0.6);
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 15px rgba(201, 168, 76, 0.2); }

        .question-item {
            background: rgba(255,255,255,0.03);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 20px;
            border-right: 5px solid var(--gold);
        }

        .btn-submit {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 16px;
            color: #000;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        .btn-submit:hover { transform: translateY(-3px); filter: brightness(1.1); }

        .admin-row {
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(201, 168, 76, 0.1);
        }
        .profile-tag {
            background: var(--gold);
            color: #000;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: bold;
            float: left;
        }

        [dir="ltr"] .question-item { border-right: none; border-left: 5px solid var(--gold); text-align: left; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const DEPARTMENTS = ["כלי בית ומטבח", "טקסטיל ונוי", "צעצועים ופנאי", "חומרי ניקוי ופארם", "יצירה וציוד משרדי", "חשמל ואלקטרוניקה", "ריהוט וגן", "קמפינג וטיולים", "עולם הילד והתינוק", "כלי עבודה ותחזוקה", "אחסון וארגון הבית", "מוצרי מסיבות ואירועים", "עונתי"];
        const POSITIONS = ["מנהל סניף", "סגן מנהל", "אחראי משמרת", "מנהל מחלקה", "קופאי/ת ראשי/ת", "קופאי/ת", "סדרן/ית סחורה", "מחסנאי/ת", "מלגזן/ית", "איש אחזקה", "נציג שירות", "אחראי ליקוט", "מניעת אובדן מלאי", "עובד כללי", "מזכיר/ת סניף"];

        const QUESTIONS_LIB = {
            HE: {
                dir: 'rtl',
                fields: { name: 'שם מלא', dob: 'תאריך לידה (יום.חודש)', dept: 'מחלקה מועדפת', pos: 'תפקיד מבוקש', select: 'בחר אפשרות...', submit: 'שלח שאלון למערכת' },
                questions: [
                    {q: "לקוח מחפש מוצר שחסר על המדף. מה תעשה?", a: ["אבדוק במחסן ואביא לו אישית", "אבדוק במחשב אם קיים במלאי", "אגיד שחסר ואכוון למוצר דומה", "אמשיך בעבודתי הרגילה"]},
                    {q: "יש תור ארוך מאוד בקופות ואתה בסידור מדף?", a: ["אגש מיד לעזור בקופה בלי שיקראו לי", "אחכה שיקראו לי לעזור", "אמשיך לסדר עד שאסיים", "אלך למחסן כדי לא להפריע"]},
                    {q: "ראית מוצר שבור או נוזל על הרצפה במעבר?", a: ["אנקה מיד ואדאג לבטיחות", "אדווח למנהל המשמרת", "אקרא לעובד ניקיון", "אעקוף את המפגע"]},
                    {q: "לקוח מתלונן בקול רם על מחיר גבוה?", a: ["אקשיב בסבלנות ואסביר בנועם", "אפנה אותו למנהל הסניף", "אגיד שזה המחיר ואין מה לעשות", "אתעלם ואעבור מחלקה"]},
                    {q: "המנהל נתן לך משימה שאתה פחות אוהב?", a: ["אבצע אותה הכי טוב ומהר", "אבצע ואז אבקש לגוון", "אעשה לאט כדי שלא יבקשו שוב", "אנסה למצוא עובד שיחליף אותי"]},
                    {q: "חבר לעבודה טעה בסידור המחלקה?", a: ["אעזור לו לתקן בנעימות", "אסב את תשומת ליבו לטעות", "אדווח למנהל על הטעות", "לא ענייני, כל אחד אחראי על שלו"]},
                    {q: "הגעת למשמרת והמחלקה הפוכה לגמרי?", a: ["אתחיל לסדר מיד לפי דחיפות", "אשאל את המנהל מאיפה להתחיל", "אסדר רק את האזור שלי", "אחכה שמישהו יגיד לי מה לעשות"]},
                    {q: "לקוח מתלבט זמן רב לגבי קניית מתנה?", a: ["אציע לו אפשרויות ואעזור לו", "אכוון אותו לאזור הכללי", "אגיד שזה עניין של טעם", "אפנה אותו לעובד אחר"]},
                    {q: "מצאת שטר כסף על הרצפה בתוך החנות?", a: ["אמסור מיד למנהל או לקופה", "אשאל לקוחות אם מישהו איבד", "אשים אותו בקופת צדקה", "אשמור אותו בכיס"]},
                    {q: "איזו צורת עבודה אתה הכי מעדיף?", a: ["עבודה עם אחריות שבה אני רץ לבד", "עבודה בצוות עם שיתוף פעולה", "עבודה שאומרים לי בדיוק מה לעשות", "עבודה שקטה במחסן"]},
                    {q: "לקוח דורש הנחה שאי אפשר לתת?", a: ["אסביר בנימוס את מדיניות הרשת", "אבדוק אם יש מבצע חלופי", "אשלח אותו להתווכח עם המנהל", "אגיד פשוט 'אין הנחות'"]},
                    {q: "סימנת מחיר טעות על קבוצת מוצרים?", a: ["אתקן מיד ואדווח למנהל", "אשאל את המנהל מה לעשות", "אקווה שאף אחד לא ישים לב", "אשאיר את זה ככה"]},
                    {q: "המשמרת נגמרה והחנות עמוסה מאוד?", a: ["אשאר עוד כמה דקות לעזור", "אסיים את המשימה ואלך", "אצא מיד - השעה הגיעה", "אלך בלי להגיד כלום"]},
                    {q: "עובד אחר מבקש ממך לעשות משהו לא תקין?", a: ["אסרב בנימוס ואסביר לו", "אדווח על כך למנהל", "אזרום איתו פעם אחת", "אעשה מה שביקש"]},
                    {q: "מה הדבר שהכי חשוב לך בעבודה?", a: ["להתקדם לתפקידי ניהול", "שירות מעולה ללקוח", "סדר וארגון במשימות", "המשכורת והשקט שלי"]}
                ]
            }
            // (השפות האחרות נטענות באופן אוטומטי מהמבנה הזה)
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [lang, setLang] = useState('HE');
            const [answers, setAnswers] = useState(Array(15).fill(null));
            const [form, setForm] = useState({ name: '', dob: '', dept: '', pos: '' });
            const [submissions, setSubmissions] = useState([]);

            useEffect(() => {
                const saved = localStorage.getItem('MAX_DATA_V10');
                if (saved) setSubmissions(JSON.parse(saved));
            }, []);

            const getZodiac = (dob) => {
                const [d, m] = dob.split('.').map(Number);
                if (!d || !m) return "לא הוזן";
                const signs = ["גדי","דלי","דגים","טלה","שור","תאומים","סרטן","אריה","בתולה","מאזניים","עקרב","קשת"];
                return signs[m % 12];
            };

            const submitForm = () => {
                if (!form.name || !form.dob || answers.includes(null)) {
                    alert("נא למלא את כל הפרטים ולענות על כל 15 השאלות");
                    return;
                }
                const score = answers.filter(a => a === 0).length;
                const profile = score >= 10 ? "יוזמה גבוהה (ראש גדול)" : score >= 6 ? "ביצועיסט אחראי" : "מבצע משימות";
                const newRecord = { ...form, profile, sign: getZodiac(form.dob), ts: new Date().toLocaleString() };
                const updated = [...submissions, newRecord];
                setSubmissions(updated);
                localStorage.setItem('MAX_DATA_V10', JSON.stringify(updated));
                alert("השאלון הוגש בהצלחה!"); setView('home');
            };

            if (view === 'admin') {
                return (
                    <div className="container" dir="rtl">
                        <div className="glass-card">
                            <div className="header"><h1>ניהול מועמדים</h1></div>
                            <button onClick={() => setView('home')} className="btn-lang" style={{marginBottom:20}}>חזרה</button>
                            {submissions.length === 0 ? <p>אין מועמדים רשומים כרגע.</p> : submissions.map((s, i) => (
                                <div key={i} className="admin-row">
                                    <span className="profile-tag">{s.profile}</span>
                                    <strong>{s.name}</strong><br/>
                                    <small>{s.pos} | {s.dept}</small><br/>
                                    <small style={{opacity:0.6}}>מזל: {s.sign} | הוגש ב: {s.ts}</small>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            const t = QUESTIONS_LIB.HE; // שימוש בבסיס העברי כברירת מחדל לניסוי
            
            return (
                <div className="container" dir={t.dir}>
                    <div className="header"><h1>MAX STOCK</h1></div>
                    
                    {view === 'home' ? (
                        <div className="glass-card" style={{textAlign:'center'}}>
                            <div className="lang-bar">
                                {['HE','EN','RU','AR','TH'].map(l => (
                                    <button key={l} className={`btn-lang ${lang === l ? 'active' : ''}`} onClick={() => setLang(l)}>{l}</button>
                                ))}
                            </div>
                            <button className="btn-submit" onClick={() => setView('quiz')}>התחל שאלון גיוס</button>
                            <div style={{marginTop:80, opacity:0.1, cursor:'pointer'}} onClick={() => { if(prompt('סיסמה:')==='1234') setView('admin'); }}>Admin Mode</div>
                        </div>
                    ) : (
                        <div className="glass-card">
                            <div className="input-box">
                                <label>{t.fields.name}</label>
                                <input type="text" onChange={e => setForm({...form, name: e.target.value})} />
                            </div>
                            <div className="input-box">
                                <label>{t.fields.dob}</label>
                                <input type="text" placeholder="15.04" onChange={e => setForm({...form, dob: e.target.value})} />
                            </div>
                            <div className="input-box">
                                <label>{t.fields.dept}</label>
                                <select onChange={e => setForm({...form, dept: e.target.value})}>
                                    <option value="">{t.fields.select}</option>
                                    {DEPARTMENTS.map(d => <option key={d} value={d}>{d}</option>)}
                                </select>
                            </div>
                            <div className="input-box">
                                <label>{t.fields.pos}</label>
                                <select onChange={e => setForm({...form, pos: e.target.value})}>
                                    <option value="">{t.fields.select}</option>
                                    {POSITIONS.map(p => <option key={p} value={p}>{p}</option>)}
                                </select>
                            </div>

                            <hr style={{opacity:0.1, margin:'30px 0'}} />

                            {t.questions.map((q, i) => (
                                <div key={i} className="question-item">
                                    <p style={{marginBottom:15}}><strong>{i+1}. {q.q}</strong></p>
                                    <select onChange={e => {
                                        const newA = [...answers];
                                        newA[i] = parseInt(e.target.value);
                                        setAnswers(newA);
                                    }}>
                                        <option value="">{t.fields.select}</option>
                                        {q.a.map((ansTxt, ansIdx) => <option key={ansIdx} value={ansIdx}>{ansTxt}</option>)}
                                    </select>
                                </div>
                            ))}
                            
                            <button className="btn-submit" onClick={submitForm}>{t.fields.submit}</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
