<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יהודה | ניתוח אינטראקציה - MAX STOCK</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <style>
        :root { --gold: #c9a84c; --bg: #0b0f1a; --card: #161c2d; --danger: #ef4444; --success: #22c55e; --info: #3b82f6; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #e2e8f0; margin: 0; padding: 20px; }
        .dashboard { max-width: 1300px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { color: var(--gold); margin: 0; font-size: 1.8rem; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        tr.candidate-row { background: var(--card); border: 1px solid rgba(255,255,255,0.05); }
        td { padding: 20px; vertical-align: top; border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05); }
        td:first-child { border-radius: 0 15px 15px 0; border-right: 1px solid rgba(255,255,255,0.05); }
        td:last-child { border-radius: 15px 0 0 15px; border-left: 1px solid rgba(255,255,255,0.05); }

        .time-badge { padding: 5px 10px; border-radius: 8px; font-weight: bold; font-size: 0.85rem; }
        .fast { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid var(--danger); }
        .solid { background: rgba(34,197,94,0.15); color: var(--success); border: 1px solid var(--success); }

        .interaction-card { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; margin-top: 10px; border-right: 3px solid var(--info); }
        .interaction-title { font-size: 0.8rem; color: var(--info); font-weight: bold; margin-bottom: 5px; display: block; }
        
        .personality-tag { display: inline-block; padding: 3px 8px; border-radius: 5px; font-size: 0.75rem; margin-left: 5px; background: rgba(201,168,76,0.1); color: var(--gold); border: 1px solid var(--gold); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const CANDIDATES = [
            { 
                id: 1, name: "ישראל ישראלי", age: 24, time: "1:45", status: "fast",
                analysis: "מועמד אימפולסיבי. ענה על השאלון במהירות שמעידה על רצון 'לסיים עם זה'.",
                social: "עלול לייצר חיכוכים עם עובדים איטיים ממנו. נוטה לפתור בעיות בקיצורי דרך במקום לעבוד לפי הפרוטוקול של המנהל."
            },
            { 
                id: 2, name: "מיכל אברהם", age: 29, time: "3:40", status: "solid",
                analysis: "גישה שירותית מובהקת. יסודית מאוד בפרטים הקטנים של סידור המדף.",
                social: "עובדת צוות קלאסית. תהיה זו שתעזור לעובדים חדשים ותגבה את המנהל בזמן לחץ. מקבלת מרות בצורה מכבדת."
            },
            { 
                id: 3, name: "יוסי לוי", age: 21, time: "3:10", status: "solid",
                analysis: "מועמד משימתי. ממוקד מאוד במה שאמרו לו לעשות.",
                social: "יסתדר מצוין עם עובדים אחרים כל עוד הגדרות התפקיד ברורות. פחות יזום אינטראקציה חברתית, אך יציית לכל הוראת מנהל ללא ערעור."
            }
        ];

        const App = () => {
            return (
                <div className="dashboard">
                    <div className="header">
                        <h1>יהודה | ניתוח עומק למנהל</h1>
                        <div style={{opacity:0.7}}>מודל חיזוי התנהגות ואינטראקציה</div>
                    </div>

                    <table>
                        <thead>
                            <tr>
                                <th style={{width:'15%'}}>מועמד וגיל</th>
                                <th style={{width:'12%'}}>זמן (יעד: 3:00)</th>
                                <th style={{width:'30%'}}>ניתוח אופי מילולי</th>
                                <th style={{width:'43%'}}>דינמיקה חברתית ואינטראקציה</th>
                            </tr>
                        </thead>
                        <tbody>
                            {CANDIDATES.map(c => (
                                <tr key={c.id} className="candidate-row">
                                    <td>
                                        <strong>{c.name}</strong><br/>
                                        <span>גיל: {c.age}</span>
                                    </td>
                                    <td>
                                        <span className={`time-badge ${c.status === 'fast' ? 'fast' : 'solid'}`}>
                                            {c.time} {c.status === 'fast' ? 'חפיף' : 'יסודי'}
                                        </span>
                                    </td>
                                    <td className="analysis-text">
                                        {c.analysis}
                                        <div style={{marginTop:'10px'}}>
                                            <span className="personality-tag">אנרגטי</span>
                                            {c.status === 'solid' && <span className="personality-tag">אמין</span>}
                                        </div>
                                    </td>
                                    <td>
                                        <div className="interaction-card">
                                            <span className="interaction-title">יחסים עם המנהל והצוות:</span>
                                            <div style={{fontSize:'0.9rem', color:'#cbd5e1'}}>{c.social}</div>
                                        </div>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
