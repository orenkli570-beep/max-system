// ── Firebase DB ──────────────────────────────────────────────────────────
var DB = {
  load: function(cb) {
    fbDB.ref("candidates").once("value", function(snap) {
      var data = snap.val();
      if (!data) { cb([]); return; }
      var list = Object.keys(data).map(function(k) {
        var item = data[k]; item._fbKey = k; return item;
      });
      cb(list);
    });
  },
  add: function(item, cb) {
    item.id = Date.now();
    item.at = new Date().toISOString();
    fbDB.ref("candidates").push(item, function() { if(cb) cb(); });
  },
  update: function(id, updates, cb) {
    fbDB.ref("candidates").orderByChild("id").equalTo(id).once("value", function(snap) {
      snap.forEach(function(child) { child.ref.update(updates); });
      if(cb) cb();
    });
  },
  remove: function(id, cb) {
    fbDB.ref("candidates").orderByChild("id").equalTo(id).once("value", function(snap) {
      snap.forEach(function(child) { child.ref.remove(); });
      if(cb) cb();
    });
  }
};

// חישוב מספר נומרולוגי (מצמצם לספרה בודדת 1-9)
function calcNum(n) {
  while (n > 9) { var s=0; var str=String(n); for(var i=0;i<str.length;i++) s+=parseInt(str[i]); n=s; }
  return n;
}

// מספר גורל מתאריך לידה
function destinyNum(dob) {
  var parts = dob.split(".");
  var sum = parseInt(parts[0]) + parseInt(parts[1]) + parseInt(parts[2]);
  return calcNum(sum);
}

// ערך נומרולוגי משם (א=1, ב=2 ... י=10→1 וכו׳)
function nameNum(name) {
  var heb = "אבגדהוזחטיכלמנסעפצקרשת";
  var sum = 0;
  for (var i = 0; i < name.length; i++) {
    var idx = heb.indexOf(name[i]);
    if (idx >= 0) sum += (idx % 9) + 1;
  }
  return sum === 0 ? 5 : calcNum(sum);
}

// ניתוח התאמה לתפקיד/מחלקה לפי שם + תאריך
function buildReport(name, dob, answers) {
  var dn = destinyNum(dob);
  var nn = nameNum(name);
  var combined = calcNum(dn + nn);
  var prof = NUM_PROFILE[combined] || NUM_PROFILE[dn];
  var age = new Date().getFullYear() - parseInt(dob.split(".")[2]);

  // ניתוח תשובות — רמת יוזמה
  var initiative = 0, service = 0, teamwork = 0, followInstr = 0;
  for (var i = 0; i < answers.length; i++) {
    if (answers[i] === 0) initiative++;
    if (answers[i] >= 2) followInstr++;
  }
  if (answers[0]===0) service++; if (answers[5]===0) service++; if (answers[9]===0) service++;
  if (answers[6]===0) teamwork++; if (answers[13]===0) teamwork++;

  // סגנון עבודה (ללא "ראש קטן")
  var style = initiative >= 9 ? "יוזם עצמאי" : initiative >= 5 ? "מאוזן" : "מבצע מסור";

  // פורטרט
  var portrait = "לפניך " + name + ", בן/בת " + age + ". " +
    "מספר הגורל הנומרולוגי: " + dn + " | ערך שם: " + nn + " | מספר שילוב: " + combined + ". " +
    prof.trait;

  // אינטראקציה מנהל–עובד — מלל בלבד
  var mgrText = prof.mgr;

  // המלצת שיבוץ
  var deptRec = prof.depts.join(", ");
  var roleRec = prof.roles.join(", ");
  var placement = "על פי הניתוח הנומרולוגי ופרופיל השם, המחלקות המתאימות הן: " + deptRec +
    ". התפקידים המומלצים: " + roleRec + ".";

  // ניתוח מעמיק של התאמה לפי ענפים
  var serviceAdapt = service >= 2 ? "מצטיין בשירות לקוחות ישיר." : "מתאים יותר לתפקידי עורף ולוגיסטיקה.";
  var teamAdapt = teamwork >= 2 ? "עובד צוות טוב — כדאי לשבצו עם אנשים משלימים." : "עדיף לעבוד באופן עצמאי עם אחריות ברורה.";
  placement += " " + serviceAdapt + " " + teamAdapt;

  return {
    portrait: portrait,
    profTitle: prof.title,
    interaction: mgrText,
    placement: placement,
    style: style,
    dn: dn, nn: nn, combined: combined,
    age: age
  };
}

  var dnCompat = [
    [1,1,"שניהם יוזמים — יתחרו על מי מוביל. כדאי לחלק אחריות ברורה בין מחלקות.","עצמאיים וממוקדים — כל אחד ב'ממלכה' שלו"],
    [1,2,"שילוב מצוין — אחד מוביל, השני מגשר ומרגיע. משלימים זה את זה.","ניהול לקוחות + תמיכה עורפית"],
    [1,5,"שניהם אנרגטיים — כימיה טובה בשעות עומס. עלולים להתפזר יחד.","מחלקות דינמיות בקצב גבוה"],
    [2,3,"שיתוף פעולה נעים ופורה. שניהם אנשיים ותקשורתיים.","שירות לקוחות, קופות"],
    [3,6,"שילוב אנושי וחם. יצירו אווירה חיובית בצוות.","כל מחלקה פרונטלית"],
    [4,8,"שניהם מעשיים ומוכווני תוצאה — שילוב יעיל מאוד.","לוגיסטיקה, מלאי, קבלת סחורה"],
    [4,4,"שניהם שיטתיים — עבודה מסודרת ויעילה אך בלי הפתעות.","בדיקת סחורה, מחסן"],
    [7,9,"שילוב עמוק ואמיתי — אחד מנתח, השני מחבר אנשים.","מחלקות מיוחדות"],
  ];

  // חיפוש תאימות ספציפית
  var matchText = "", taskText = "";
  var found = false;
  for (var i=0; i<dnCompat.length; i++) {
    var row = dnCompat[i];
    if ((dn1===row[0]&&dn2===row[1])||(dn1===row[1]&&dn2===row[0])) {
      matchText = row[2]; taskText = row[3]; found = true; break;
    }
  }

  // תאימות כללית לפי הפרש מספרים
  var diff = Math.abs(dn1 - dn2);
  if (!found) {
    if (diff === 0) { matchText = "אותו מספר גורל — אישיות דומה מאוד. טובים כשאחד מנחה את השני, פחות טובים כשמתחרים."; taskText = "משימות זהות בסיבוב"; }
    else if (diff <= 2) { matchText = "מספרי גורל קרובים — בסיס ערכי משותף. שיתוף פעולה טוב עם תיאום מינימלי."; taskText = "רוב המשימות הצוותיות"; }
    else if (diff <= 4) { matchText = "הבדל מתון — כל אחד מביא זווית שונה. יעבדו טוב אם יש הגדרת תפקידים ברורה."; taskText = "משימות עם חלוקת עבודה"; }
    else { matchText = "הבדל גדול בין מספרי הגורל — שני טיפוסים שונים מאוד. יכולים להשלים אם הצוות מנוהל נכון."; taskText = "עדיף לתת להם מחלקות שונות"; }
  }

  // ניתוח ערכי שם
  var nameDiff = Math.abs(nn1 - nn2);
  var nameText = nameDiff <= 1 ? "ערכי השם שלהם קרובים מאוד — תחושת 'גל דומה' ביניהם." :
    nameDiff <= 3 ? "ערכי השם משלימים — תקשורת טבעית ביניהם." :
    "ערכי השם שונים — ייקח זמן לבנות שפה משותפת, אבל אפשרי.";

  // אזהרות
  var warnings = [];
  if (st1 === "יוזם עצמאי" && st2 === "יוזם עצמאי") warnings.push("שניהם יוזמים — חשוב להגדיר מי אחראי על מה כדי למנוע חיכוך.");
  if (diff >= 5) warnings.push("הבדל אופי משמעותי — מומלץ להכיר אחד את השני לפני משמרת משותפת ממושכת.");

  return {
    matchText: matchText,
    taskText: taskText,
    nameText: nameText,
    warnings: warnings,
    dn1: dn1, dn2: dn2, nn1: nn1, nn2: nn2
  };
}

// ── CANDIDATE ────────────────────────────────────────────────────────────
function renderCandidate() {
  var L = LANGS[state.lang];
  document.getElementById("candidate-screen").setAttribute("dir", L.dir);
  var lb = document.getElementById("lang-bar");
  lb.innerHTML = "";
  ["he","en","ru","ar","th"].forEach(function(k) {
    var btn = document.createElement("button");
    btn.className = "lang-btn" + (state.lang === k ? " active" : "");
    btn.textContent = LANGS[k].label;
    btn.onclick = function() { state.lang = k; renderCandidate(); };
    lb.appendChild(btn);
  });
  var L = LANGS[state.lang];
  var el = document.getElementById("cand-content");

  if (state.step === "done") {
    el.innerHTML = '<div class="done-wrap"><div><div class="done-icon">✅</div><h2>' + L.thanks + '</h2></div></div>';
    return;
  }
  if (state.step === "info") {
    el.innerHTML = '<div class="card"><h2 style="color:#4a3520;margin-bottom:20px;font-size:18px">' + L.title + '</h2>' +
      '<label>' + L.fname + '</label><input type="text" id="inp-name" value="' + state.name + '">' +
      '<label>' + L.fdob + '</label><input type="text" id="inp-dob" value="' + state.dob + '" placeholder="DD.MM.YYYY">' +
      '<div id="cand-err" class="err" style="display:none"></div>' +
      '<button class="btn-gold" onclick="candNext()">' + L.next + '</button></div>';
    return;
  }
  if (state.step === "q") {
    var qi = state.qi; var pct = Math.round(((qi+1)/15)*100); var qd = L.q[qi];
    var ah = "";
    for (var i = 0; i < qd.a.length; i++) {
      ah += '<button class="ans-btn' + (state.answers[qi]===i?" selected":"") + '" onclick="pickAns(' + i + ')">' + qd.a[i] + '</button>';
    }
    el.innerHTML = '<div class="card">' +
      '<div class="prog-bar-wrap"><div class="prog-nums"><span>' + (qi+1) + ' / 15</span><span>' + pct + '%</span></div>' +
      '<div class="prog-track"><div class="prog-fill" style="width:' + pct + '%"></div></div></div>' +
      '<p class="q-text">' + qd.q + '</p><div class="ans-list">' + ah + '</div>' +
      (qi===14 ? '<div id="cand-err" class="err" style="display:none"></div><button class="btn-gold" onclick="candSubmit()">' + L.send + '</button>' : '') +
      '</div>';
  }
}
function candNext() {
  var name = document.getElementById("inp-name").value.trim();
  var dob = document.getElementById("inp-dob").value.trim();
  var L = LANGS[state.lang]; var e = document.getElementById("cand-err");
  if (!name||!dob) { e.textContent=L.e1; e.style.display="block"; return; }
  if (!/^\d{2}\.\d{2}\.\d{4}$/.test(dob)) { e.textContent=L.e3; e.style.display="block"; return; }
  var p=dob.split("."); if(parseInt(p[0])<1||parseInt(p[0])>31||parseInt(p[1])<1||parseInt(p[1])>12||parseInt(p[2])<1950||parseInt(p[2])>2010){e.textContent=L.e3;e.style.display="block";return;}
  state.name=name; state.dob=dob; state.step="q"; state.qi=0; renderCandidate();
}
function pickAns(i) {
  state.answers[state.qi]=i;
  if (state.qi<14) { state.qi++; renderCandidate(); } else { renderCandidate(); }
}
function candSubmit() {
  for(var i=0;i<state.answers.length;i++){if(state.answers[i]===null){var e=document.getElementById("cand-err");e.textContent=LANGS[state.lang].e2;e.style.display="block";return;}}
  DB.add({name:state.name,dob:state.dob,lang:state.lang,answers:state.answers,report:buildReport(state.name,state.dob,state.answers)}, function() {
    state.step="done"; renderCandidate();
  });
}

function runDetailMatch() {
  var id2=document.getElementById("detail-match-c2").value;
  var res=document.getElementById("detail-match-result");
  if(!id2){res.innerHTML='<p style="color:#e74c3c">יש לבחור עובד שני</p>';return;}
  DB.load(function(candidates) {
    var c1=candidates.find(function(c){return c.id===state.selId;});
    var c2=candidates.find(function(c){return c.id==id2;});
    if(!c1||!c2){res.innerHTML='<p style="color:#e74c3c">שגיאה</p>';return;}
    var m=calcMatch(c1,c2);
    var warnHtml='';
    for(var j=0;j<m.warnings.length;j++) warnHtml+='<div class="warn-item">⚠️ '+m.warnings[j]+'</div>';
    res.innerHTML=
      '<div class="match-result">' +
      '<h4>ניתוח: '+c1.name+' + '+c2.name+'</h4>' +
      '<div style="margin-bottom:12px">' +
      '<p style="color:#a0b0c0;font-size:12px;margin-bottom:4px">מספרי גורל: '+c1.name+' = '+m.dn1+' | '+c2.name+' = '+m.dn2+'</p>' +
      '<p style="color:#a0b0c0;font-size:12px">ערכי שם: '+c1.name+' = '+m.nn1+' | '+c2.name+' = '+m.nn2+'</p>' +

      '<div class="task-item" style="margin-bottom:10px">📋 משימות מומלצות יחד: '+m.taskText+'</div>' +
      '<div class="task-item" style="margin-bottom:10px">✍️ '+m.nameText+'</div>' +
      (warnHtml?'<div class="match-warning"><h5>⚠️ נקודות לתשומת לב</h5>'+warnHtml+'</div>':'') +

  });
}

    }
    var opts='<option value="">בחר מועמד...</option>';
    for(var i=0;i<candidates.length;i++) opts+='<option value="'+candidates[i].id+'">'+candidates[i].name+' ('+candidates[i].dob+')</option>';
    el.innerHTML='<div dir="rtl">' +
      '<button class="back-btn" onclick="goBack()">← חזרה לרשימה</button>' +
      '<div class="match-card">' +
      '<h3>🔗 התאמת עובדים — כימיה ומשימות משותפות</h3>' +
      '<div class="match-select-row">' +
      '<div><label>עובד ראשון</label><select id="match-c1" onchange="clearMatchResult()">'+opts+'</select></div>' +
      '<div><label>עובד שני</label><select id="match-c2" onchange="clearMatchResult()">'+opts+'</select></div>' +
      '</div>' +
      '<button class="btn-purple" onclick="runMatch()">🔍 בצע ניתוח התאמה</button>' +
      '<div id="match-result"></div>' +
      '</div></div>';
  });
}

function clearMatchResult() { document.getElementById("match-result").innerHTML=""; }

function runMatch() {
  var id1=document.getElementById("match-c1").value;
  var id2=document.getElementById("match-c2").value;
  var res=document.getElementById("match-result");
  if(!id1||!id2){res.innerHTML='<p style="color:#e74c3c;margin-top:12px">יש לבחור שני מועמדים</p>';return;}
  if(id1===id2){res.innerHTML='<p style="color:#e74c3c;margin-top:12px">יש לבחור שני מועמדים שונים</p>';return;}
  DB.load(function(candidates) {
    var c1=candidates.find(function(c){return c.id==id1;});
    var c2=candidates.find(function(c){return c.id==id2;});
    if(!c1||!c2){res.innerHTML='<p style="color:#e74c3c;margin-top:12px">שגיאה — מועמד לא נמצא</p>';return;}
    var m=calcMatch(c1,c2);
    var warnHtml='';
    for(var j=0;j<m.warnings.length;j++) warnHtml+='<div class="warn-item">⚠️ '+m.warnings[j]+'</div>';
    res.innerHTML=
      '<div class="match-result">' +
      '<h4>ניתוח: '+c1.name+' + '+c2.name+'</h4>' +
      '<div style="margin-bottom:12px">' +
      '<p style="color:#a0b0c0;font-size:12px;margin-bottom:4px">מספרי גורל: '+c1.name+' = '+m.dn1+' | '+c2.name+' = '+m.dn2+'</p>' +
      '<p style="color:#a0b0c0;font-size:12px">ערכי שם: '+c1.name+' = '+m.nn1+' | '+c2.name+' = '+m.nn2+'</p>' +
      '</div>' +
      '<div class="task-item" style="margin-bottom:10px">🤝 '+m.matchText+'</div>' +
      '<div class="task-item" style="margin-bottom:10px">📋 משימות מומלצות יחד: '+m.taskText+'</div>' +
      '<div class="task-item" style="margin-bottom:10px">✍️ '+m.nameText+'</div>' +
      (warnHtml?'<div class="match-warning"><h5>⚠️ נקודות לתשומת לב</h5>'+warnHtml+'</div>':'') +
      '</div>';
  });
}
</script>
</body>
</html>
