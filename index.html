<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAX STOCK | HR & Team Sync</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --gold: #c9a84c; --bg: #0b0f1a; --card: #161e2d; --text: #f8fafc; --accent: #38bdf8; --success: #22c55e; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; }
        .glass-card { background: var(--card); border: 1px solid var(--gold); border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 20px; padding-bottom: 10px; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #000; color: #fff; margin-bottom: 10px; font-size: 16px; }
        .q-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 10px; border-right: 4px solid var(--gold); }
        .btn-main { width: 100%; padding: 18px; background: var(--gold); color: #000; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        
        /* לוח מנהל */
        .admin-card { background: #1e293b; border-radius: 15px; padding: 15px; margin-bottom: 20px; border: 1px solid #444; }
        .analysis-box { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 10px; border-left: 3px solid var(--accent); margin: 10px 0; font-size: 0.95rem; }
        .interaction-panel { background: rgba(56, 189, 248, 0.05); border: 1px dashed var(--accent); padding: 10px; border-radius: 10px; margin-top: 10px; }
        .buddy-zone { background: rgba(201,168,76,0.1); border: 1px solid var(--gold); padding: 10px; border-radius: 10px; margin-top: 10px; }
        .btn-status { padding: 8px; border-radius: 6px; border: 1px solid #444; background: #000; color: #fff; cursor: pointer; font-size: 0.8rem; flex: 1; }
        .btn-status.active { background: var(--gold); color: #000; }
        .footer-btn { background: none; border: none; color: #444; width: 100%; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const ADMIN_PASS = "MAX2026";
        const STAFF = ["יוסי (מחסן)", "מיכל (קופות)", "דנה (טקסטיל)", "רוני (צעצועים)", "אחמד (כללי)"];

        const QUESTIONS = [
            { id: 1, q: "לקוח מחפש מוצר שחסר על המדף?", a: ["אבדוק במחסן", "אבדוק במחשב", "אכוון לדומה", "אמשיך בעבודתי"] },
            { id: 2, q: "תור ארוך מאוד בקופות ואתה בסידור מדף?", a: ["אגש מיד לעזור", "אחכה שיקראו לי", "אסיים קודם את המדף", "אלך למחסן"] },
            { id: 5, q: "המנהל נתן לך משימה שאתה פחות אוהב?", a: ["אבצע הכי טוב ומהר", "אבצע ואז אבקש לגוון", "אעשה לאט", "אחפש מישהו שיחליף"] },
            { id: 10, q: "איזו צורת עבודה אתה מעדיף?", a: ["אחריות עצמאית", "עבודת צוות", "שיגידו לי מה לעשות", "שקט במחסן"] },
            { id: 15, q: "מה הדבר שהכי חשוב לך בעבודה?", a: ["שירות מעולה", "קידום לניהול", "סדר וארגון", "המשכורת והשקט"] }
        ];

        const App = () => {
            const [view, setView] = useState('quiz');
            const [form, setForm] = useState({ fn: '', ln: '', bday: '' });
            const [candidates, setCandidates] = useState([]);
            const [startTime, setStartTime] = useState(Date.now());
            const [answers, setAnswers] = useState({});

            const handleSend = () => {
                const duration = Math.floor((Date.now() - startTime) / 1000);
                const digits = form.bday.replace(/\D/g,'').split('').map(Number);
                const sum = digits.reduce((a,b)=>a+b, 0) % 9 || 9;
                
                const numMeanings = {
                    1: "מנהיג, עצמאי", 2: "איש צוות, רגיש", 3: "תקשורתי, יצירתי", 4: "יסודי, יציב", 
                    5: "מהיר, אוהב שינוי", 6: "אחראי, שירותי", 7: "שקט, חקרן", 8: "ניהולי, שאפתן", 9: "עוזר, רב-תחומי"
                };

                const newCand = {
                    id: Date.now(),
                    ...form,
                    name: `${form.fn} ${form.ln}`,
                    duration: `${Math.floor(duration/60)}:${duration%60}`,
                    analysis: `מספר גורל ${sum} (${numMeanings[sum]}). ${answers[10] == 1 ? 'טיפוס חברתי' : 'עובד עצמאי'}.`,
                    buddy: '',
                    status: 'ממתין'
                };
                setCandidates([newCand, ...candidates]);
                setView('done');
            };

            if (view === 'admin') return (
                <div className="container" dir="rtl">
                    <div className="header"><h1>ניהול ואינטראקציה</h1></div>
                    <button onClick={()=>setView('quiz')} style={{marginBottom:10}}>חזרה לשאלון</button>
                    {candidates.map(c => (
                        <div key={c.id} className="admin-card">
                            <h3 style={{margin:0, color:'var(--gold)'}}>{c.name}</h3>
                            <div style={{fontSize:'0.8rem', opacity:0.7}}>תאריך לידה: {c.bday} | זמן מילוי: {c.duration}</div>
                            
                            <div className="analysis-box">
                                <strong>אבחון:</strong> {c.analysis}
                            </div>

                            <div className="interaction-panel">
                                <strong>🤝 אינטראקציה מנהל-מועמד:</strong>
                                <div style={{fontSize:'0.85rem', marginTop:5}}>• שיחת היכרות אישית<br/>• סיבוב פיזי בסניף ותיאום ציפיות</div>
                            </div>

                            <div className="buddy-zone">
                                <strong>👥 חיבור לצוות (Buddy):</strong>
                                <select value={c.buddy} onChange={(e)=>setCandidates(candidates.map(can=>can.id===c.id?{...can, buddy:e.target.value}:can))}>
                                    <option value="">בחר עובד ותיק שילווה...</option>
                                    {STAFF.map(s=><option key={s} value={s}>{s}</option>)}
                                </select>
                                {c.buddy && <div style={{fontSize:'0.8rem', color:'var(--gold)'}}>משימה ל{c.buddy}: להכיר ל{c.fn} את הצוות בהפסקה.</div>}
                            </div>

                            <div style={{display:'flex', gap:5, marginTop:10}}>
                                {['ממתין', 'התקבל', 'נדחה'].map(s=>(
                                    <button key={s} className={`btn-status ${c.status===s?'active':''}`} onClick={()=>setCandidates(candidates.map(can=>can.id===c.id?{...can, status:s}:can))}>{s}</button>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            );

            if (view === 'done') return (
                <div className="container" style={{textAlign:'center', paddingTop:100}}>
                    <div className="glass-card"><h1>תודה!</h1><p>הפרטים עברו למנהל.</p><button className="btn-main" onClick={()=>setView('quiz')}>מועמד חדש</button></div>
                </div>
            );

            return (
                <div className="container" dir="rtl">
                    <div className="glass-card">
                        <div className="header"><h1>MAX STOCK</h1></div>
                        <input placeholder="שם פרטי" value={form.fn} onChange={e=>setForm({...form, fn:e.target.value})} />
                        <input placeholder="שם משפחה" value={form.ln} onChange={e=>setForm({...form, ln:e.target.value})} />
                        <input type="date" value={form.bday} onChange={e=>setForm({...form, bday:e.target.value})} />
                        
                        {QUESTIONS.map((q, i) => (
                            <div key={i} className="q-card">
                                <p style={{margin:'0 0 10px 0'}}><strong>{q.q}</strong></p>
                                <select onChange={e=>setAnswers({...answers, [q.id]:e.target.value})}>
                                    <option value="">בחר תשובה...</option>
                                    {q.a.map((a,idx)=><option key={idx} value={idx}>{a}</option>)}
                                </select>
                            </div>
                        ))}
                        <button className="btn-main" onClick={handleSend}>שלח שאלון</button>
                        <button className="footer-btn" onClick={()=>{
                            const p = prompt("סיסמה:");
                            if(p && p.toUpperCase() === ADMIN_PASS) setView('admin');
                        }}>כניסת מנהל 🔒</button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
